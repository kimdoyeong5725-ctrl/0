<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Test Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: sans-serif; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; color: #00dfff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">🎮 3D 화면 테스트 중...</div>
    <div id="canvas-container"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // 1. Scene
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0f1d);

            // 2. Camera
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 10);
            camera.lookAt(0, 0, 0);

            // 3. Renderer
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 4. Light
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 5. Grid Ground
            const grid = new THREE.GridHelper(20, 20, 0x00dfff, 0x444444);
            scene.add(grid);

            // 6. Character (Cube)
            const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const material = new THREE.MeshStandardMaterial({ color: 0x00dfff });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.y = 0.75;
            scene.add(cube);

            // 7. Animation Loop
            function animate() {
                requestAnimationFrame(animate);
                cube.rotation.y += 0.01; // 회전하는 큐브
                renderer.render(scene, camera);
            }
            animate();

            // Resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
</html>
