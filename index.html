<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bleach 3D: Toshiro Hitsugaya Ultimate RPG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+KR:wght@700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #030712; font-family: 'Noto Sans KR', sans-serif; color: #fff; }

        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* GLB UPLOAD BAR */
        #glb-upload-bar { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(15, 23, 42, 0.95); padding: 6px 12px; border-radius: 20px; border: 1.5px solid #00f0ff; pointer-events: auto; box-shadow: 0 0 15px rgba(0,240,255,0.4); z-index: 100; }
        .upload-btn { background: #0284c7; border: none; color: white; padding: 6px 12px; font-size: 11px; font-weight: 800; border-radius: 12px; cursor: pointer; }
        .upload-btn input { display: none; }

        /* PROFILE HUD */
        #profile-card { position: absolute; top: 55px; left: 15px; width: 250px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1.5px solid rgba(0, 240, 255, 0.5); border-radius: 14px; padding: 12px; pointer-events: auto; }
        .card-header { display: flex; justify-content: space-between; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 900; color: #00f0ff; margin-bottom: 4px; }
        .bar-wrap { width: 100%; height: 11px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; position: relative; margin-top: 4px; }
        .bar-inner { height: 100%; transition: width 0.15s ease-out; }
        #hp-bar { background: linear-gradient(90deg, #ff0055, #ff5500); box-shadow: 0 0 8px #ff0055; }
        #mp-bar { background: linear-gradient(90deg, #00f0ff, #0077ff); box-shadow: 0 0 8px #00f0ff; }
        .bar-label { position: absolute; width: 100%; text-align: center; font-size: 8px; font-weight: 900; top: 0px; text-shadow: 0 0 3px #000; }

        /* JOYSTICK */
        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 130px; height: 130px; background: rgba(255, 255, 255, 0.08); border: 2px solid rgba(0, 240, 255, 0.5); border-radius: 65px; pointer-events: auto; }
        #joystick-knob { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; background: #00f0ff; border-radius: 25px; box-shadow: 0 0 15px #00f0ff; }

        /* SKILL BUTTONS */
        .skill-bar { position: absolute; bottom: 25px; right: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; pointer-events: auto; }
        .skill-btn { width: 72px; height: 72px; background: rgba(15, 23, 42, 0.95); border: 2px solid #00f0ff; border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; font-weight: 900; cursor: pointer; position: relative; overflow: hidden; box-shadow: 0 0 12px rgba(0,240,255,0.3); }
        .skill-btn:active { transform: scale(0.92); }
        .cd-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 0%; background: rgba(0,0,0,0.85); }

        /* BANKAI OVERLAY TEXT */
        #bankai-text { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%) scale(0.5); font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900; color: #00f0ff; text-shadow: 0 0 25px #00f0ff, 0 0 50px #0077ff; opacity: 0; transition: all 0.3s ease-out; pointer-events: none; }
        #bankai-text.active { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="glb-upload-bar">
            <label class="upload-btn">📁 토실로 GLB 파일 로드<input type="file" accept=".glb,.gltf" onchange="loadToshiroGLB(event)"></label>
        </div>

        <div id="profile-card">
            <div class="card-header">
                <span>❄️ 히츠가야 토시로 LV. <span id="val-level">1</span></span>
                <span style="color:#ffd700;">💰 <span id="val-gold">0</span></span>
            </div>
            <div class="bar-wrap"><div id="hp-bar" class="bar-inner" style="width:100%;"></div><div id="txt-hp" class="bar-label">2000 / 2000</div></div>
            <div class="bar-wrap"><div id="mp-bar" class="bar-inner" style="width:100%;"></div><div id="txt-mp" class="bar-label">500 / 500</div></div>
        </div>

        <div id="bankai-text">대홍련빙륜환 (大紅蓮氷輪丸)</div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div class="skill-bar">
            <div class="skill-btn" onclick="useSkill('Z')">군청빙전 [Z]<div id="cd-z" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('X')">육의빙결진 [X]<div id="cd-x" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('C')" style="border-color:#a855f7;">만해 [C]<div id="cd-c" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('V')" style="border-color:#ff0055;">천송빙화 [V]<div id="cd-v" class="cd-overlay"></div></div>
        </div>
    </div>

    <script>
        // --- Game Engine Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x060d1a);
        scene.fog = new THREE.FogExp2(0x060d1a, 0.01);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const gltfLoader = new THREE.GLTFLoader();

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const dirLight = new THREE.DirectionalLight(0xa5f3fc, 1.4);
        dirLight.position.set(30, 60, 20); dirLight.castShadow = true;
        scene.add(dirLight);

        // 흙/빙륜환 연출 필드 바닥
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(160, 160), new THREE.MeshStandardMaterial({ color: 0x271f18, roughness: 0.9 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground);

        // --- 플레이어 (토시로 3D 모델) ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        let bankaiActive = false;
        let iceWings = null;

        function buildToshiroMesh() {
            const t = new THREE.Group();
            
            // 검은 사패장
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.8, 2.8, 16), new THREE.MeshStandardMaterial({ color: 0x0f172a }));
            body.position.y = 1.4; body.castShadow = true; t.add(body);

            // 십번대 대장 백색 하오리
            const haori = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 1.1, 2.2, 16, 1, true), new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide }));
            haori.position.y = 1.5; t.add(haori);

            // 토시로은발 머리
            const hair = new THREE.Mesh(new THREE.SphereGeometry(0.65, 16, 16), new THREE.MeshStandardMaterial({ color: 0xe2e8f0 }));
            hair.position.y = 3.1; t.add(hair);

            // 얼음 참백도 (빙륜환)
            const sword = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3.2, 0.08), new THREE.MeshStandardMaterial({ color: 0x38bdf8, metalness: 0.9 }));
            sword.position.set(0.9, 1.8, 0.3); sword.rotation.z = -Math.PI / 6; t.add(sword);

            // 만해 전용 얼음 날개 (대홍련빙륜환)
            const wingShape = new THREE.ConeGeometry(2.2, 4.0, 4);
            const wingMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.8, wireframe: true });
            iceWings = new THREE.Mesh(wingShape, wingMat);
            iceWings.rotation.x = Math.PI / 2; iceWings.position.set(0, 2.2, -0.8);
            iceWings.visible = false;
            t.add(iceWings);

            return t;
        }

        playerGroup.add(buildToshiroMesh());

        function loadToshiroGLB(e) {
            const file = e.target.files[0];
            if(!file) return;
            gltfLoader.load(URL.createObjectURL(file), (gltf) => {
                playerGroup.clear();
                const m = gltf.scene;
                m.scale.set(2.2, 2.2, 2.2);
                playerGroup.add(m);
                alert("토시로 GLB 모델 로드 완료!");
            });
        }

        // --- 적 (아란칼/호로 몬스터) ---
        const enemies = [];
        function createHollow(x, z) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 0.9, 4.0, 16), new THREE.MeshStandardMaterial({ color: 0x1e1e24 }));
            body.position.y = 2.0; g.add(body);
            const mask = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            mask.position.set(0, 4.2, 0.2); g.add(mask);
            g.position.set(x, 0, z); scene.add(g);
            enemies.push({ group: g, hp: 800, maxHp: 800, alive: true, spawnX: x, spawnZ: z });
        }
        createHollow(15, -12); createHollow(-18, -15); createHollow(18, 12);

        // --- 터치 조이스틱 ---
        let joystickDir = { x: 0, z: 0 };
        const joyZone = document.getElementById('joystick-zone');
        const joyKnob = document.getElementById('joystick-knob');
        let dragging = false;

        joyZone.addEventListener('pointerdown', e => { dragging = true; updateJoystick(e); });
        window.addEventListener('pointermove', e => { if (dragging) updateJoystick(e); });
        window.addEventListener('pointerup', () => {
            dragging = false; joystickDir = { x: 0, z: 0 };
            joyKnob.style.top = '40px'; joyKnob.style.left = '40px';
        });

        function updateJoystick(e) {
            const rect = joyZone.getBoundingClientRect();
            let dx = e.clientX - (rect.left + rect.width / 2);
            let dy = e.clientY - (rect.top + rect.height / 2);
            const dist = Math.hypot(dx, dy), maxR = 45;
            if (dist > maxR) { dx = (dx / dist) * maxR; dy = (dy / dist) * maxR; }
            joyKnob.style.left = `${40 + dx}px`; joyKnob.style.top = `${40 + dy}px`;
            joystickDir.x = dx / maxR; joystickDir.z = dy / maxR;
        }

        // --- 스킬 및 전투 로직 ---
        let playerStats = { hp: 2000, maxHp: 2000, mp: 500, maxMp: 500 };
        const cd = { Z: 0, X: 0, C: 0, V: 0 };

        function useSkill(type) {
            if (cd[type] > 0) return;

            if (type === 'Z') { // 군청빙전 (전방 빙결 파동)
                cd.Z = 1.0; spawnIceEffect(playerGroup.position, 6, 0x00f0ff);
                dealDamage(250, 7);
            } else if (type === 'X') { // 육의빙결진 (범위 얼음 기둥)
                if (playerStats.mp < 50) return;
                playerStats.mp -= 50; cd.X = 3.5;
                spawnIceSpike(playerGroup.position);
                dealDamage(450, 10);
            } else if (type === 'C') { // 대홍련빙륜환 (만해 변신)
                if (playerStats.mp < 120) return;
                playerStats.mp -= 120; cd.C = 12.0;
                bankaiActive = true; if(iceWings) iceWings.visible = true;
                const txt = document.getElementById('bankai-text');
                txt.classList.add('active'); setTimeout(() => txt.classList.remove('active'), 2000);
            } else if (type === 'V') { // 천송빙화 (거대 빙룡 낙하)
                if (playerStats.mp < 200) return;
                playerStats.mp -= 200; cd.V = 15.0;
                spawnIceDragonEffect();
                dealDamage(1000, 18);
            }
            updateUI();
        }

        function dealDamage(dmg, range) {
            enemies.forEach(e => {
                if (e.alive && playerGroup.position.distanceTo(e.group.position) <= range) {
                    e.hp -= (bankaiActive ? dmg * 1.5 : dmg);
                    if (e.hp <= 0) {
                        e.alive = false; scene.remove(e.group);
                        setTimeout(() => { e.hp = e.maxHp; e.alive = true; e.group.position.set(e.spawnX, 0, e.spawnZ); scene.add(e.group); }, 5000);
                    }
                }
            });
        }

        // --- 이펙트 구현 ---
        function spawnIceEffect(pos, size, color) {
            const p = new THREE.Mesh(new THREE.RingGeometry(0.1, size, 16), new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.8 }));
            p.rotation.x = -Math.PI / 2; p.position.copy(pos); p.position.y = 0.1;
            scene.add(p);
            let s = 0.1;
            const timer = setInterval(() => {
                s += 0.5; p.scale.set(s, s, s); p.material.opacity -= 0.05;
                if (p.material.opacity <= 0) { scene.remove(p); clearInterval(timer); }
            }, 30);
        }

        function spawnIceSpike(pos) {
            const spike = new THREE.Mesh(new THREE.ConeGeometry(3, 12, 6), new THREE.MeshBasicMaterial({ color: 0x38bdf8, wireframe: true }));
            spike.position.copy(pos); scene.add(spike);
            setTimeout(() => scene.remove(spike), 800);
        }

        function spawnIceDragonEffect() {
            const dragon = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 6, 20, 12), new THREE.MeshBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.9 }));
            dragon.position.set(playerGroup.position.x, 20, playerGroup.position.z);
            scene.add(dragon);
            let y = 20;
            const t = setInterval(() => {
                y -= 2; dragon.position.y = y;
                if (y <= 0) { scene.remove(dragon); spawnIceEffect(playerGroup.position, 16, 0x38bdf8); clearInterval(t); }
            }, 20);
        }

        function updateUI() {
            document.getElementById('hp-bar').style.width = `${(playerStats.hp / playerStats.maxHp) * 100}%`;
            document.getElementById('txt-hp').innerText = `${playerStats.hp} / ${playerStats.maxHp}`;
            document.getElementById('mp-bar').style.width = `${(playerStats.mp / playerStats.maxMp) * 100}%`;
            document.getElementById('txt-mp').innerText = `${Math.ceil(playerStats.mp)} / ${playerStats.maxMp}`;
        }

        // --- Loop ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (joystickDir.x !== 0 || joystickDir.z !== 0) {
                const dir = new THREE.Vector3(joystickDir.x, 0, joystickDir.z).normalize();
                playerGroup.position.x += dir.x * 16 * delta;
                playerGroup.position.z += dir.z * 16 * delta;
                playerGroup.rotation.y = Math.atan2(dir.x, dir.z);
            }

            ['Z','X','C','V'].forEach(k => {
                if (cd[k] > 0) {
                    cd[k] = Math.max(0, cd[k] - delta);
                    const maxCd = k === 'Z' ? 1.0 : (k === 'X' ? 3.5 : (k === 'C' ? 12.0 : 15.0));
                    document.getElementById(`cd-${k.toLowerCase()}`).style.height = `${(cd[k] / maxCd) * 100}%`;
                }
            });

            if (playerStats.mp < playerStats.maxMp) {
                playerStats.mp = Math.min(playerStats.maxMp, playerStats.mp + delta * 15);
                updateUI();
            }

            camera.position.set(playerGroup.position.x, playerGroup.position.y + 22, playerGroup.position.z + 26);
            camera.lookAt(playerGroup.position);

            renderer.render(scene, camera);
        }

        updateUI();
        animate();
    </script>
</body>
</html>
