<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Canvas Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            overflow: hidden;
            background-color: #02050a;
            font-family: sans-serif;
            width: 100vw;
            height: 100vh;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        #top-bar {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .status-box {
            background: rgba(5, 12, 22, 0.85);
            border: 1.5px solid #00dfff;
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            pointer-events: auto;
            box-shadow: 0 0 10px rgba(0, 223, 255, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 6px;
            pointer-events: auto;
        }

        .top-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 1.5px solid #00dfff;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 223, 255, 0.3);
        }

        #joystick-container {
            position: absolute;
            bottom: 25px;
            left: 25px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(0, 223, 255, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        #joystick-knob {
            width: 40px;
            height: 40px;
            background: #00dfff;
            border-radius: 50%;
            box-shadow: 0 0 12px #00dfff;
        }

        .btn-container {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 200px;
            height: 200px;
            pointer-events: none;
        }

        .action-btn {
            position: absolute;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.85);
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.65);
            box-shadow: 0 0 10px rgba(0,223,255,0.4);
        }

        #attack-btn { width: 70px; height: 70px; bottom: 5px; right: 5px; background: #0077b6; font-size: 14px; box-shadow: 0 0 15px #00dfff; }
        #dodge-btn { width: 45px; height: 45px; bottom: 5px; right: 90px; font-size: 10px; }
        #skill-btn { width: 45px; height: 45px; bottom: 90px; right: 5px; font-size: 10px; }
        #ult-btn { width: 55px; height: 55px; bottom: 75px; right: 75px; font-size: 10px; background: #0055a5; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="top-bar">
            <div class="status-box" id="status">❄️ 토시로 Lv.1 STAGE 1</div>
            <div class="btn-group">
                <button class="top-btn" id="reset-btn">카메라 리셋</button>
            </div>
        </div>

        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>

        <div class="btn-container">
            <div id="dodge-btn" class="action-btn">회피</div>
            <div id="skill-btn" class="action-btn">돌진</div>
            <div id="ult-btn" class="action-btn">빙륜환</div>
            <div id="attack-btn" class="action-btn">공격</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 게임 변수
        let player = {
            x: 0,
            z: 0,
            angle: 0,
            size: 20,
            speed: 3
        };

        let camera = { x: 0, z: -150 };

        document.getElementById('reset-btn').addEventListener('click', () => {
            player.x = 0;
            player.z = 0;
        });

        // 조이스틱 연동
        let moveDir = { x: 0, z: 0 };
        const joystick = document.getElementById('joystick-container');
        const knob = document.getElementById('joystick-knob');
        let active = false, startX = 0, startY = 0;

        function handleStart(e) {
            active = true;
            const t = e.touches ? e.touches[0] : e;
            startX = t.clientX; startY = t.clientY;
        }

        function handleMove(e) {
            if (!active) return;
            const t = e.touches ? e.touches[0] : e;
            let dx = t.clientX - startX;
            let dy = t.clientY - startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxR = 35;

            if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
            knob.style.transform = `translate(${dx}px, ${dy}px)`;
            
            moveDir.x = dx / maxR;
            moveDir.z = dy / maxR;
        }

        function handleEnd() {
            active = false;
            knob.style.transform = 'translate(0px, 0px)';
            moveDir.x = 0; moveDir.z = 0;
        }

        joystick.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);
        joystick.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        // 3D 투영 매핑
        function project(x, z) {
            const relX = x - player.x;
            const relZ = z - player.z + 250; // 카메라인근 거리
            const fov = 300;
            const scale = fov / (relZ || 1);
            
            return {
                x: canvas.width / 2 + relX * scale,
                y: canvas.height / 2 + 80 + relZ * scale * 0.15,
                scale: Math.max(0.1, scale)
            };
        }

        // 메인 렌더링 루프
        function loop() {
            // 플레이어 이동
            if (moveDir.x !== 0 || moveDir.z !== 0) {
                player.x += moveDir.x * player.speed;
                player.z -= moveDir.z * player.speed;
                player.angle = Math.atan2(moveDir.x, -moveDir.z);
            }

            // 바탕 청소
            ctx.fillStyle = '#02050a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3D 격자 바닥 그리기
            ctx.strokeStyle = 'rgba(0, 223, 255, 0.25)';
            ctx.lineWidth = 1;

            const gridStep = 40;
            const range = 600;

            const startX = Math.floor((player.x - range) / gridStep) * gridStep;
            const endX = Math.floor((player.x + range) / gridStep) * gridStep;
            const startZ = Math.floor((player.z - range) / gridStep) * gridStep;
            const endZ = Math.floor((player.z + range) / gridStep) * gridStep;

            for (let x = startX; x <= endX; x += gridStep) {
                const p1 = project(x, startZ);
                const p2 = project(x, endZ);
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }

            for (let z = startZ; z <= endZ; z += gridStep) {
                const p1 = project(startX, z);
                const p2 = project(endX, z);
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }

            // 캐릭터 그리기
            const pPos = project(player.x, player.z);

            // 그림자
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath();
            ctx.ellipse(pPos.x, pPos.y + 10, 15 * pPos.scale, 8 * pPos.scale, 0, 0, Math.PI * 2);
            ctx.fill();

            // 캐릭터 원형 본체
            ctx.fillStyle = '#00dfff';
            ctx.shadowColor = '#00dfff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(pPos.x, pPos.y - 12 * pPos.scale, 14 * pPos.scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 시선 방향 표시
            const headX = pPos.x + Math.sin(player.angle) * 12 * pPos.scale;
            const headY = pPos.y - 12 * pPos.scale - Math.cos(player.angle) * 12 * pPos.scale;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(headX, headY, 4 * pPos.scale, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
