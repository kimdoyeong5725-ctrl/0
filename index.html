<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bleach: Soul Society RPG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Noto+Sans+KR:wght@500;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #020617; font-family: 'Noto Sans KR', sans-serif; color: #fff; }

        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* HUD TOP LEFT */
        #profile-card { position: absolute; top: 20px; left: 20px; width: 320px; background: rgba(15, 23, 42, 0.88); backdrop-filter: blur(12px); border: 1px solid rgba(0, 240, 255, 0.4); border-radius: 12px; padding: 16px; pointer-events: auto; box-shadow: 0 0 20px rgba(0,240,255,0.15); }
        .card-header { display: flex; justify-content: space-between; font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900; color: #00f0ff; margin-bottom: 8px; }
        .bar-wrap { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; position: relative; margin-top: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .bar-inner { height: 100%; transition: width 0.15s ease-out; }
        #hp-bar { background: linear-gradient(90deg, #ff0055, #ff5500); box-shadow: 0 0 8px #ff0055; }
        #mp-bar { background: linear-gradient(90deg, #00f0ff, #0077ff); box-shadow: 0 0 8px #00f0ff; }
        #exp-bar { background: linear-gradient(90deg, #a855f7, #ec4899); }
        .bar-label { position: absolute; width: 100%; text-align: center; font-size: 8px; font-weight: 800; top: 0; line-height: 12px; text-shadow: 0 0 3px #000; }

        /* QUEST HUD */
        #quest-tracker { position: absolute; top: 20px; right: 20px; width: 280px; background: rgba(15, 23, 42, 0.88); backdrop-filter: blur(12px); border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 12px; padding: 14px; font-size: 12px; }
        #quest-tracker h4 { color: #ffd700; font-family: 'Orbitron', sans-serif; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }

        /* STATS MENU MODAL */
        #stats-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 2px solid #00f0ff; border-radius: 16px; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        #stats-modal.active { opacity: 1; pointer-events: auto; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; font-size: 14px; }
        .stat-btn { width: 32px; height: 32px; background: #00f0ff; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; color: #000; }

        /* ACTION / SKILL BUTTONS */
        .skill-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; pointer-events: auto; }
        .skill-btn { width: 68px; height: 68px; background: rgba(15, 23, 42, 0.9); border: 1.5px solid #00f0ff; border-radius: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; font-weight: 800; cursor: pointer; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .skill-btn .key { font-size: 10px; color: #ffd700; margin-bottom: 2px; font-family: 'Orbitron'; }
        .cd-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 0%; background: rgba(2, 6, 23, 0.85); }

        /* INTERACTION PROMPT */
        #interact-prompt { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); background: rgba(0, 240, 255, 0.2); border: 1px solid #00f0ff; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 800; color: #00f0ff; opacity: 0; transition: opacity 0.2s; text-shadow: 0 0 8px #00f0ff; }

        #btn-stat-toggle { position: absolute; top: 160px; left: 20px; padding: 10px 18px; background: rgba(0,240,255,0.15); border: 1px solid #00f0ff; color: #fff; border-radius: 8px; font-weight: 700; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="profile-card">
            <div class="card-header">
                <span>❄️ 십번대 대장 LV. <span id="val-level">1</span></span>
                <span style="color:#ffd700;">💰 <span id="val-gold">0</span></span>
            </div>
            <div class="bar-wrap"><div id="hp-bar" class="bar-inner" style="width:100%;"></div><div id="txt-hp" class="bar-label">1000 / 1000</div></div>
            <div class="bar-wrap"><div id="mp-bar" class="bar-inner" style="width:100%;"></div><div id="txt-mp" class="bar-label">300 / 300</div></div>
            <div class="bar-wrap" style="height:6px; margin-top:6px;"><div id="exp-bar" class="bar-inner" style="width:0%;"></div></div>
        </div>

        <button id="btn-stat-toggle" onclick="toggleStatsModal()">영력 / 스탯 (C)</button>

        <div id="quest-tracker">
            <h4>📜 정령정 토벌 퀘스트</h4>
            <p id="quest-desc">사신 NPC를 찾아가 임무를 받으세요.</p>
            <p id="quest-progress" style="color:#00f0ff; font-weight:800; margin-top:4px;"></p>
        </div>

        <div id="interact-prompt">💬 대화하기 [E]</div>

        <div class="skill-bar">
            <div class="skill-btn" onclick="useSkill('Z')"><span class="key">[Z]</span>참격<div id="cd-z" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('X')"><span class="key">[X]</span>빙룡선<div id="cd-x" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('C')"><span class="key">[C]</span>만해<div id="cd-c" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('V')"><span class="key">[V]</span>천송빙화<div id="cd-v" class="cd-overlay"></div></div>
        </div>

        <div id="stats-modal">
            <h3 style="color:#00f0ff; margin-bottom:12px;">능력치 배분 (포인트: <span id="val-stat-pts">0</span>)</h3>
            <div class="stat-row">
                <span>⚔️ 참격/근력 (Melee): <b id="val-stat-str">1</b></span>
                <button class="stat-btn" onclick="addStat('str')">+</button>
            </div>
            <div class="stat-row">
                <span>🛡️ 영압/방어 (Defense): <b id="val-stat-def">1</b></span>
                <button class="stat-btn" onclick="addStat('def')">+</button>
            </div>
            <div class="stat-row">
                <span>❄️ 빙륜환/영력 (Reiryoku): <b id="val-stat-frt">1</b></span>
                <button class="stat-btn" onclick="addStat('frt')">+</button>
            </div>
            <button onclick="toggleStatsModal()" style="width:100%; padding:10px; margin-top:10px; background:#ff0055; border:none; color:#fff; border-radius:8px; font-weight:800; cursor:pointer;">닫기</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🚨 GLB 모델 경로 설정 (본인 파일 파일명/URL 입력)
        // ==========================================
        const GLB_PATHS = {
            player: null, // 예: './models/hitsugaya.glb'
            enemy: null,  // 예: './models/hollow.glb'
            npc: null     // 예: './models/shinigami_npc.glb'
        };

        // --- RPG Save State ---
        const DEFAULT_STATE = {
            level: 1, exp: 0, maxExp: 100, gold: 0, statPoints: 0,
            str: 1, def: 1, frt: 1,
            hp: 1000, mp: 300,
            quest: { active: false, target: 4, current: 0, rewardGold: 500, rewardExp: 300 }
        };

        let playerState = JSON.parse(localStorage.getItem('BLEACH_RPG_SAVE')) || { ...DEFAULT_STATE };
        function saveGame() { localStorage.setItem('BLEACH_RPG_SAVE', JSON.stringify(playerState)); }

        function getMaxHp() { return 1000 + (playerState.def - 1) * 200; }
        function getMaxMp() { return 300 + (playerState.frt - 1) * 50; }
        function getMeleeDmg() { return 80 + playerState.str * 25; }
        function getSkillDmg() { return 140 + playerState.frt * 40; }

        // --- Three.js Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);
        scene.fog = new THREE.FogExp2(0x020617, 0.012);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const gltfLoader = new THREE.GLTFLoader();

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(30, 50, 30); sun.castShadow = true;
        scene.add(sun);

        // 정령정 필드 (Soul Society World Ground)
        const ground = new THREE.Mesh(new THREE.BoxGeometry(100, 1, 100), new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.8 }));
        ground.position.y = -0.5; ground.receiveShadow = true; scene.add(ground);
        scene.add(new THREE.GridHelper(100, 40, 0x00f0ff, 0x1e293b));

        // Player Setup (GLB or Fallback Mesh)
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        if (GLB_PATHS.player) {
            gltfLoader.load(GLB_PATHS.player, (gltf) => {
                const model = gltf.scene;
                model.scale.set(1, 1, 1);
                playerGroup.add(model);
            });
        } else {
            // 기본 히츠가야 대체 3D 모델
            const pBody = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.6), new THREE.MeshStandardMaterial({ color: 0x0f172a }));
            pBody.position.y = 0.8; playerGroup.add(pBody);
            const pHaori = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.1, 0.6), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            pHaori.position.set(0, 1.1, 0); playerGroup.add(pHaori);
            const pIceWing = new THREE.Mesh(new THREE.BoxGeometry(3.2, 1.2, 0.1), new THREE.MeshStandardMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.8 }));
            pIceWing.position.set(0, 1.4, -0.3); playerGroup.add(pIceWing);
        }

        // NPC Setup
        const npcGroup = new THREE.Group();
        npcGroup.position.set(0, 0, -10); scene.add(npcGroup);

        if (GLB_PATHS.npc) {
            gltfLoader.load(GLB_PATHS.npc, (gltf) => { npcGroup.add(gltf.scene); });
        } else {
            const npcMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2), new THREE.MeshStandardMaterial({ color: 0xffd700 }));
            npcMesh.position.y = 1; npcGroup.add(npcMesh);
        }

        // Enemies (Hollows)
        const enemies = [];
        function spawnHollow(x, z) {
            const eGroup = new THREE.Group();
            eGroup.position.set(x, 0, z); scene.add(eGroup);

            if (GLB_PATHS.enemy) {
                gltfLoader.load(GLB_PATHS.enemy, (gltf) => { eGroup.add(gltf.scene); });
            } else {
                const eMesh = new THREE.Mesh(new THREE.BoxGeometry(1.8, 3.2, 1.8), new THREE.MeshStandardMaterial({ color: 0x475569 }));
                eMesh.position.y = 1.6; eGroup.add(eMesh);
                const mask = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.0, 0.4), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                mask.position.set(0, 2.4, 0.8); eGroup.add(mask);
            }

            enemies.push({ group: eGroup, hp: 450, maxHp: 450, alive: true, spawnX: x, spawnZ: z });
        }

        spawnHollow(15, -15); spawnHollow(-15, -18); spawnHollow(18, 12); spawnHollow(-18, 15);

        // Dynamic Active Effects & Combat
        const activeFX = [];
        const keys = {};
        const cd = { Z: 0, X: 0, C: 0, V: 0 };

        window.addEventListener('keydown', e => {
            const k = e.key.toUpperCase();
            keys[k] = true;
            if (k === 'E') checkNPCInteract();
            if (k === 'C' && !keys['CONTROL']) toggleStatsModal();
            if (['Z','X','C','V'].includes(k)) useSkill(k);
        });
        window.addEventListener('keyup', e => keys[e.key.toUpperCase()] = false);

        function toggleStatsModal() { document.getElementById('stats-modal').classList.toggle('active'); }

        function addStat(type) {
            if (playerState.statPoints <= 0) return;
            playerState.statPoints--; playerState[type]++;
            updateUI(); saveGame();
        }

        function useSkill(type) {
            if (cd[type] > 0) return;
            const mpCost = type === 'Z' ? 0 : (type === 'X' ? 40 : (type === 'C' ? 80 : 120));
            if (playerState.mp < mpCost) return;

            playerState.mp -= mpCost;

            if (type === 'Z') {
                cd.Z = 0.5; attackEnemies(getMeleeDmg(), 5);
            } else if (type === 'X') {
                cd.X = 3.0; attackEnemies(getSkillDmg() * 1.4, 8);
                const dragon = new THREE.Mesh(new THREE.ConeGeometry(2, 8, 16), new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true }));
                dragon.rotation.x = Math.PI / 2; dragon.position.copy(playerGroup.position);
                scene.add(dragon); activeFX.push({ mesh: dragon, life: 0.4 });
            } else if (type === 'C') {
                cd.C = 6.0; attackEnemies(getSkillDmg() * 2.2, 12);
                const aura = new THREE.Mesh(new THREE.RingGeometry(1, 6, 32), new THREE.MeshBasicMaterial({ color: 0x00f0ff, side: THREE.DoubleSide, transparent: true, opacity: 0.8 }));
                aura.rotation.x = Math.PI / 2; aura.position.copy(playerGroup.position);
                scene.add(aura); activeFX.push({ mesh: aura, life: 0.6 });
            } else if (type === 'V') {
                cd.V = 10.0; attackEnemies(getSkillDmg() * 3.5, 18);
            }
            updateUI();
        }

        function attackEnemies(damage, range) {
            enemies.forEach(e => {
                if (!e.alive) return;
                if (playerGroup.position.distanceTo(e.group.position) <= range) {
                    e.hp -= damage;
                    if (e.hp <= 0) {
                        e.alive = false; scene.remove(e.group);
                        onEnemyKilled();
                        setTimeout(() => {
                            e.hp = e.maxHp; e.alive = true;
                            e.group.position.set(e.spawnX, 0, e.spawnZ); scene.add(e.group);
                        }, 6000);
                    }
                }
            });
        }

        function onEnemyKilled() {
            gainExp(60); playerState.gold += 120;
            if (playerState.quest.active) {
                playerState.quest.current++;
                if (playerState.quest.current >= playerState.quest.target) {
                    playerState.quest.active = false;
                    gainExp(playerState.quest.rewardExp);
                    playerState.gold += playerState.quest.rewardGold;
                    alert('🎉 [정령정 퀘스트] 호로 토벌 완료! 대량의 영력과 골드를 획득했습니다.');
                }
            }
            updateUI(); saveGame();
        }

        function gainExp(amount) {
            playerState.exp += amount;
            if (playerState.exp >= playerState.maxExp) {
                playerState.exp -= playerState.maxExp;
                playerState.level++; playerState.statPoints += 3;
                playerState.maxExp = Math.floor(playerState.maxExp * 1.5);
                playerState.hp = getMaxHp(); playerState.mp = getMaxMp();
            }
        }

        function checkNPCInteract() {
            if (playerGroup.position.distanceTo(npcGroup.position) < 4.5) {
                if (!playerState.quest.active) {
                    playerState.quest.active = true; playerState.quest.current = 0;
                    alert('📜 [사신 NPC] 침입한 호로 4마리를 소멸시키고 정령정을 보호하세요!');
                    updateUI(); saveGame();
                }
            }
        }

        function updateUI() {
            const maxHp = getMaxHp(), maxMp = getMaxMp();
            document.getElementById('val-level').innerText = playerState.level;
            document.getElementById('val-gold').innerText = playerState.gold;
            document.getElementById('txt-hp').innerText = `${Math.ceil(playerState.hp)} / ${maxHp}`;
            document.getElementById('hp-bar').style.width = `${(playerState.hp / maxHp) * 100}%`;
            document.getElementById('txt-mp').innerText = `${Math.ceil(playerState.mp)} / ${maxMp}`;
            document.getElementById('mp-bar').style.width = `${(playerState.mp / maxMp) * 100}%`;
            document.getElementById('exp-bar').style.width = `${(playerState.exp / playerState.maxExp) * 100}%`;

            document.getElementById('val-stat-pts').innerText = playerState.statPoints;
            document.getElementById('val-stat-str').innerText = playerState.str;
            document.getElementById('val-stat-def').innerText = playerState.def;
            document.getElementById('val-stat-frt').innerText = playerState.frt;

            const q = playerState.quest;
            document.getElementById('quest-desc').innerText = q.active ? `호로 토벌 (${q.current}/${q.target})` : '사신 NPC [E]를 통해 토벌 임무를 받으세요.';
            document.getElementById('quest-progress').innerText = q.active ? `보상: 💰${q.rewardGold} / EXP ${q.rewardExp}` : '';
        }

        // Render Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            ['Z','X','C','V'].forEach(k => {
                if (cd[k] > 0) {
                    cd[k] = Math.max(0, cd[k] - delta);
                    const maxCd = k === 'Z' ? 0.5 : (k === 'X' ? 3.0 : (k === 'C' ? 6.0 : 10.0));
                    document.getElementById(`cd-${k.toLowerCase()}`).style.height = `${(cd[k] / maxCd) * 100}%`;
                }
            });

            // Player Movement
            const moveSpeed = 14 * delta;
            let moveX = 0, moveZ = 0;
            if (keys['W']) moveZ -= 1; if (keys['S']) moveZ += 1;
            if (keys['A']) moveX -= 1; if (keys['D']) moveX += 1;

            if (moveX !== 0 || moveZ !== 0) {
                const dir = new THREE.Vector3(moveX, 0, moveZ).normalize();
                playerGroup.position.x += dir.x * moveSpeed;
                playerGroup.position.z += dir.z * moveSpeed;
                playerGroup.rotation.y = Math.atan2(dir.x, dir.z);
            }

            document.getElementById('interact-prompt').style.opacity = playerGroup.position.distanceTo(npcGroup.position) < 4.5 ? '1' : '0';

            if (playerState.mp < getMaxMp()) {
                playerState.mp = Math.min(getMaxMp(), playerState.mp + delta * 10);
                updateUI();
            }

            activeFX.forEach((fx, i) => {
                fx.life -= delta;
                if (fx.life <= 0) { scene.remove(fx.mesh); activeFX.splice(i, 1); }
            });

            camera.position.set(playerGroup.position.x, playerGroup.position.y + 16, playerGroup.position.z + 18);
            camera.lookAt(playerGroup.position);

            renderer.render(scene, camera);
        }

        updateUI();
        animate();
    </script>
</body>
</html>
