<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bleach: Soul Society 3D RPG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Noto+Sans+KR:wght@500;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #020617; font-family: 'Noto Sans KR', sans-serif; color: #fff; }

        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* GLB UPLOADER TOP BAR */
        #glb-upload-bar { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(15, 23, 42, 0.9); padding: 8px 12px; border-radius: 12px; border: 1px solid #00f0ff; pointer-events: auto; z-index: 100; }
        .upload-btn { background: #0284c7; border: none; color: white; padding: 6px 10px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .upload-btn input { display: none; }

        /* HUD TOP LEFT */
        #profile-card { position: absolute; top: 60px; left: 15px; width: 260px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(0, 240, 255, 0.4); border-radius: 12px; padding: 12px; pointer-events: auto; }
        .card-header { display: flex; justify-content: space-between; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 900; color: #00f0ff; margin-bottom: 6px; }
        .bar-wrap { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; position: relative; margin-top: 4px; }
        .bar-inner { height: 100%; transition: width 0.15s ease-out; }
        #hp-bar { background: linear-gradient(90deg, #ff0055, #ff5500); }
        #mp-bar { background: linear-gradient(90deg, #00f0ff, #0077ff); }
        #exp-bar { background: linear-gradient(90deg, #a855f7, #ec4899); }
        .bar-label { position: absolute; width: 100%; text-align: center; font-size: 8px; font-weight: 800; top: -1px; }

        /* QUEST HUD */
        #quest-tracker { position: absolute; top: 60px; right: 15px; width: 220px; background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 12px; padding: 10px; font-size: 11px; }
        #quest-tracker h4 { color: #ffd700; font-family: 'Orbitron', sans-serif; margin-bottom: 4px; }

        /* STATS MODAL */
        #stats-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: rgba(15, 23, 42, 0.95); border: 2px solid #00f0ff; border-radius: 16px; padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        #stats-modal.active { opacity: 1; pointer-events: auto; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 13px; }
        .stat-btn { width: 28px; height: 28px; background: #00f0ff; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; color: #000; }

        /* JOYSTICK FOR MOBILE */
        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(0, 240, 255, 0.4); border-radius: 60px; pointer-events: auto; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #00f0ff; border-radius: 25px; opacity: 0.8; }

        /* ACTION SKILL BUTTONS */
        .skill-bar { position: absolute; bottom: 25px; right: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; pointer-events: auto; }
        .skill-btn { width: 62px; height: 62px; background: rgba(15, 23, 42, 0.9); border: 1.5px solid #00f0ff; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 10px; font-weight: 800; cursor: pointer; position: relative; overflow: hidden; }
        .cd-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 0%; background: rgba(0,0,0,0.8); }

        #btn-stat-toggle { position: absolute; top: 165px; left: 15px; padding: 6px 12px; background: rgba(0,240,255,0.2); border: 1px solid #00f0ff; color: #fff; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; pointer-events: auto; }
        #interact-prompt { position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%); background: rgba(0,240,255,0.2); border: 1px solid #00f0ff; padding: 6px 14px; border-radius: 15px; font-size: 12px; font-weight: 700; opacity: 0; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="glb-upload-bar">
            <label class="upload-btn">📁 플레이어 GLB<input type="file" accept=".glb,.gltf" onchange="loadUserGLB(event, 'player')"></label>
            <label class="upload-btn" style="background:#e11d48;">📁 적 GLB<input type="file" accept=".glb,.gltf" onchange="loadUserGLB(event, 'enemy')"></label>
            <label class="upload-btn" style="background:#eab308; color:#000;">📁 NPC GLB<input type="file" accept=".glb,.gltf" onchange="loadUserGLB(event, 'npc')"></label>
        </div>

        <div id="profile-card">
            <div class="card-header">
                <span>❄️ 십번대 대장 LV. <span id="val-level">1</span></span>
                <span style="color:#ffd700;">💰 <span id="val-gold">0</span></span>
            </div>
            <div class="bar-wrap"><div id="hp-bar" class="bar-inner" style="width:100%;"></div><div id="txt-hp" class="bar-label">1000 / 1000</div></div>
            <div class="bar-wrap"><div id="mp-bar" class="bar-inner" style="width:100%;"></div><div id="txt-mp" class="bar-label">300 / 300</div></div>
            <div class="bar-wrap" style="height:4px; margin-top:4px;"><div id="exp-bar" class="bar-inner" style="width:0%;"></div></div>
        </div>

        <button id="btn-stat-toggle" onclick="toggleStatsModal()">스탯 / 영력 (C)</button>

        <div id="quest-tracker">
            <h4>📜 정령정 토벌</h4>
            <p id="quest-desc">사신 NPC를 찾아가 임무 수락</p>
            <p id="quest-progress" style="color:#00f0ff; font-weight:800; margin-top:2px;"></p>
        </div>

        <div id="interact-prompt">💬 대화하기 [E]</div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div class="skill-bar">
            <div class="skill-btn" onclick="useSkill('Z')">참격 [Z]<div id="cd-z" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('X')">빙룡선 [X]<div id="cd-x" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('C')">만해 [C]<div id="cd-c" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('V')">천송빙화 [V]<div id="cd-v" class="cd-overlay"></div></div>
        </div>

        <div id="stats-modal">
            <h3 style="color:#00f0ff; margin-bottom:10px;">능력치 (포인트: <span id="val-stat-pts">0</span>)</h3>
            <div class="stat-row"><span>⚔️ 참격 (Melee): <b id="val-stat-str">1</b></span><button class="stat-btn" onclick="addStat('str')">+</button></div>
            <div class="stat-row"><span>🛡️ 영압 (Def): <b id="val-stat-def">1</b></span><button class="stat-btn" onclick="addStat('def')">+</button></div>
            <div class="stat-row"><span>❄️ 빙륜환 (Fruit): <b id="val-stat-frt">1</b></span><button class="stat-btn" onclick="addStat('frt')">+</button></div>
            <button onclick="toggleStatsModal()" style="width:100%; padding:8px; margin-top:8px; background:#ff0055; border:none; color:#fff; border-radius:6px; font-weight:bold;">닫기</button>
        </div>
    </div>

    <script>
        // --- Save Data ---
        const DEFAULT_STATE = { level: 1, exp: 0, maxExp: 100, gold: 0, statPoints: 0, str: 1, def: 1, frt: 1, hp: 1000, mp: 300, quest: { active: false, target: 3, current: 0, rewardGold: 300, rewardExp: 200 } };
        let playerState = JSON.parse(localStorage.getItem('BLEACH_SAVE_V2')) || { ...DEFAULT_STATE };
        function saveGame() { localStorage.setItem('BLEACH_SAVE_V2', JSON.stringify(playerState)); }

        function getMaxHp() { return 1000 + (playerState.def - 1) * 150; }
        function getMaxMp() { return 300 + (playerState.frt - 1) * 50; }
        function getMeleeDmg() { return 60 + playerState.str * 20; }
        function getSkillDmg() { return 120 + playerState.frt * 30; }

        // --- Engine Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0f1d);
        scene.fog = new THREE.FogExp2(0x0a0f1d, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const gltfLoader = new THREE.GLTFLoader();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(30, 50, 20); sun.castShadow = true;
        scene.add(sun);

        // --- 맵 (정령정 필드 및 구조물 복원) ---
        const ground = new THREE.Mesh(new THREE.CylinderGeometry(60, 62, 2, 32), new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 }));
        ground.position.y = -1; ground.receiveShadow = true; scene.add(ground);
        scene.add(new THREE.GridHelper(120, 30, 0x00f0ff, 0x334155));

        // 정령정 건물의 3D 벽면 구조물 복원
        function createBuilding(x, z, w, h, d) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: 0x334155 }));
            b.position.set(x, h / 2, z); b.castShadow = true; scene.add(b);
        }
        createBuilding(-20, -25, 12, 10, 12);
        createBuilding(20, -25, 12, 10, 12);
        createBuilding(0, -35, 20, 14, 10);

        // --- 플레이어 모델 ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        let defaultPlayerMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 1.2), new THREE.MeshStandardMaterial({ color: 0x00f0ff }));
        defaultPlayerMesh.position.y = 1.1; playerGroup.add(defaultPlayerMesh);

        // --- NPC 모델 ---
        const npcGroup = new THREE.Group();
        npcGroup.position.set(0, 0, -12); scene.add(npcGroup);
        let defaultNpcMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 2.2, 16), new THREE.MeshStandardMaterial({ color: 0xffd700 }));
        defaultNpcMesh.position.y = 1.1; npcGroup.add(defaultNpcMesh);

        // --- 적 (호로/몬스터) ---
        const enemies = [];
        let loadedEnemyModel = null;

        function spawnEnemy(x, z) {
            const eGroup = new THREE.Group();
            eGroup.position.set(x, 0, z); scene.add(eGroup);

            let mesh;
            if (loadedEnemyModel) {
                mesh = loadedEnemyModel.clone();
            } else {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.6, 1.6), new THREE.MeshStandardMaterial({ color: 0xff0055 }));
                mesh.position.y = 1.3;
            }
            eGroup.add(mesh);
            enemies.push({ group: eGroup, hp: 300, maxHp: 300, alive: true, spawnX: x, spawnZ: z });
        }

        spawnEnemy(12, -10);
        spawnEnemy(-14, -12);
        spawnEnemy(15, 10);

        // --- 화면상에서 GLB 파일 직접 로드 함수 ---
        function loadUserGLB(event, targetType) {
            const file = event.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            gltfLoader.load(url, (gltf) => {
                const model = gltf.scene;
                model.scale.set(1, 1, 1);

                if (targetType === 'player') {
                    playerGroup.clear();
                    playerGroup.add(model);
                } else if (targetType === 'npc') {
                    npcGroup.clear();
                    npcGroup.add(model);
                } else if (targetType === 'enemy') {
                    loadedEnemyModel = model;
                    enemies.forEach(e => {
                        e.group.clear();
                        e.group.add(model.clone());
                    });
                }
                alert(`${targetType.toUpperCase()} GLB 모델이 성공적으로 교체되었습니다!`);
            });
        }

        // --- 조이스틱 & 키보드 이동 로직 ---
        let joystickDir = { x: 0, z: 0 };
        const joyZone = document.getElementById('joystick-zone');
        const joyKnob = document.getElementById('joystick-knob');
        let dragging = false;

        joyZone.addEventListener('pointerdown', e => { dragging = true; updateJoystick(e); });
        window.addEventListener('pointermove', e => { if (dragging) updateJoystick(e); });
        window.addEventListener('pointerup', () => {
            dragging = false;
            joystickDir = { x: 0, z: 0 };
            joyKnob.style.top = '35px'; joyKnob.style.left = '35px';
        });

        function updateJoystick(e) {
            const rect = joyZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = e.clientX - centerX;
            let dy = e.clientY - centerY;
            const dist = Math.hypot(dx, dy);
            const maxR = 40;

            if (dist > maxR) { dx = (dx / dist) * maxR; dy = (dy / dist) * maxR; }
            joyKnob.style.left = `${35 + dx}px`;
            joyKnob.style.top = `${35 + dy}px`;

            joystickDir.x = dx / maxR;
            joystickDir.z = dy / maxR;
        }

        const keys = {};
        window.addEventListener('keydown', e => {
            const k = e.key.toUpperCase(); keys[k] = true;
            if (k === 'E') checkNPCInteract();
            if (k === 'C' && !keys['CONTROL']) toggleStatsModal();
            if (['Z','X','C','V'].includes(k)) useSkill(k);
        });
        window.addEventListener('keyup', e => keys[e.key.toUpperCase()] = false);

        // --- 전투 및 RPG 로직 ---
        const cd = { Z: 0, X: 0, C: 0, V: 0 };

        function toggleStatsModal() { document.getElementById('stats-modal').classList.toggle('active'); }
        function addStat(type) {
            if (playerState.statPoints <= 0) return;
            playerState.statPoints--; playerState[type]++; updateUI(); saveGame();
        }

        function useSkill(type) {
            if (cd[type] > 0) return;
            const mpCost = type === 'Z' ? 0 : (type === 'X' ? 30 : (type === 'C' ? 60 : 100));
            if (playerState.mp < mpCost) return;

            playerState.mp -= mpCost;
            if (type === 'Z') { cd.Z = 0.5; attackEnemies(getMeleeDmg(), 4); }
            else if (type === 'X') { cd.X = 3.0; attackEnemies(getSkillDmg() * 1.3, 7); }
            else if (type === 'C') { cd.C = 6.0; attackEnemies(getSkillDmg() * 2.0, 10); }
            else if (type === 'V') { cd.V = 10.0; attackEnemies(getSkillDmg() * 3.0, 15); }
            updateUI();
        }

        function attackEnemies(dmg, range) {
            enemies.forEach(e => {
                if (!e.alive) return;
                if (playerGroup.position.distanceTo(e.group.position) <= range) {
                    e.hp -= dmg;
                    if (e.hp <= 0) {
                        e.alive = false; scene.remove(e.group);
                        onEnemyKilled();
                        setTimeout(() => {
                            e.hp = e.maxHp; e.alive = true;
                            e.group.position.set(e.spawnX, 0, e.spawnZ); scene.add(e.group);
                        }, 5000);
                    }
                }
            });
        }

        function onEnemyKilled() {
            gainExp(50); playerState.gold += 100;
            if (playerState.quest.active) {
                playerState.quest.current++;
                if (playerState.quest.current >= playerState.quest.target) {
                    playerState.quest.active = false;
                    gainExp(playerState.quest.rewardExp); playerState.gold += playerState.quest.rewardGold;
                    alert('🎉 토벌 완료! 보상이 지급되었습니다.');
                }
            }
            updateUI(); saveGame();
        }

        function gainExp(amt) {
            playerState.exp += amt;
            if (playerState.exp >= playerState.maxExp) {
                playerState.exp -= playerState.maxExp;
                playerState.level++; playerState.statPoints += 3;
                playerState.maxExp = Math.floor(playerState.maxExp * 1.4);
                playerState.hp = getMaxHp(); playerState.mp = getMaxMp();
            }
        }

        function checkNPCInteract() {
            if (playerGroup.position.distanceTo(npcGroup.position) < 4) {
                if (!playerState.quest.active) {
                    playerState.quest.active = true; playerState.quest.current = 0;
                    alert('📜 퀘스트 수락: 호로 몬스터 3마리를 처치하세요!');
                    updateUI(); saveGame();
                }
            }
        }

        function updateUI() {
            const maxHp = getMaxHp(), maxMp = getMaxMp();
            document.getElementById('val-level').innerText = playerState.level;
            document.getElementById('val-gold').innerText = playerState.gold;
            document.getElementById('txt-hp').innerText = `${Math.ceil(playerState.hp)} / ${maxHp}`;
            document.getElementById('hp-bar').style.width = `${(playerState.hp / maxHp) * 100}%`;
            document.getElementById('txt-mp').innerText = `${Math.ceil(playerState.mp)} / ${maxMp}`;
            document.getElementById('mp-bar').style.width = `${(playerState.mp / maxMp) * 100}%`;
            document.getElementById('exp-bar').style.width = `${(playerState.exp / playerState.maxExp) * 100}%`;

            document.getElementById('val-stat-pts').innerText = playerState.statPoints;
            document.getElementById('val-stat-str').innerText = playerState.str;
            document.getElementById('val-stat-def').innerText = playerState.def;
            document.getElementById('val-stat-frt').innerText = playerState.frt;

            const q = playerState.quest;
            document.getElementById('quest-desc').innerText = q.active ? `호로 처치 (${q.current}/${q.target})` : '사신 NPC [E] 대화';
            document.getElementById('quest-progress').innerText = q.active ? `보상: 💰${q.rewardGold} / EXP ${q.rewardExp}` : '';
        }

        // --- Loop ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 이동 처리 (키보드 + 조이스틱 동시 지원)
            let mx = joystickDir.x, mz = joystickDir.z;
            if (keys['W']) mz -= 1; if (keys['S']) mz += 1;
            if (keys['A']) mx -= 1; if (keys['D']) mx += 1;

            if (mx !== 0 || mz !== 0) {
                const dir = new THREE.Vector3(mx, 0, mz).normalize();
                playerGroup.position.x += dir.x * 12 * delta;
                playerGroup.position.z += dir.z * 12 * delta;
                playerGroup.rotation.y = Math.atan2(dir.x, dir.z);
            }

            // Cooldown UI
            ['Z','X','C','V'].forEach(k => {
                if (cd[k] > 0) {
                    cd[k] = Math.max(0, cd[k] - delta);
                    const maxCd = k === 'Z' ? 0.5 : (k === 'X' ? 3.0 : (k === 'C' ? 6.0 : 10.0));
                    document.getElementById(`cd-${k.toLowerCase()}`).style.height = `${(cd[k] / maxCd) * 100}%`;
                }
            });

            document.getElementById('interact-prompt').style.opacity = playerGroup.position.distanceTo(npcGroup.position) < 4 ? '1' : '0';

            // 마나 회복
            if (playerState.mp < getMaxMp()) {
                playerState.mp = Math.min(getMaxMp(), playerState.mp + delta * 8);
                updateUI();
            }

            // 카메라 연동
            camera.position.set(playerGroup.position.x, playerGroup.position.y + 16, playerGroup.position.z + 18);
            camera.lookAt(playerGroup.position);

            renderer.render(scene, camera);
        }

        updateUI();
        animate();
    </script>
</body>
</html>
