<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grand Sea 3D: RPG Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Noto+Sans+KR:wght@500;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #020617; font-family: 'Noto Sans KR', sans-serif; color: #fff; }

        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* HUD TOP LEFT */
        #profile-card { position: absolute; top: 20px; left: 20px; width: 320px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 12px; padding: 16px; pointer-events: auto; }
        .card-header { display: flex; justify-content: space-between; font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; color: #00f0ff; margin-bottom: 8px; }
        .bar-wrap { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; position: relative; margin-top: 4px; }
        .bar-inner { height: 100%; transition: width 0.15s ease-out; }
        #hp-bar { background: linear-gradient(90deg, #ff0055, #ff5500); }
        #mp-bar { background: linear-gradient(90deg, #00f0ff, #0077ff); }
        #exp-bar { background: linear-gradient(90deg, #a855f7, #ec4899); }
        .bar-label { position: absolute; width: 100%; text-align: center; font-size: 8px; font-weight: 800; top: 0; line-height: 12px; }

        /* QUEST HUD */
        #quest-tracker { position: absolute; top: 20px; right: 20px; width: 260px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 12px; padding: 14px; font-size: 12px; }
        #quest-tracker h4 { color: #ffd700; font-family: 'Orbitron', sans-serif; margin-bottom: 6px; }

        /* STATS MENU MODAL */
        #stats-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 2px solid #00f0ff; border-radius: 16px; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; pointer-events: auto; }
        #stats-modal.active { opacity: 1; pointer-events: auto; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; font-size: 14px; }
        .stat-btn { width: 32px; height: 32px; background: #00f0ff; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; color: #000; }

        /* ACTION / SKILL BUTTONS */
        .skill-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; pointer-events: auto; }
        .skill-btn { width: 60px; height: 60px; background: rgba(15, 23, 42, 0.9); border: 1.5px solid #00f0ff; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; font-weight: 800; cursor: pointer; position: relative; overflow: hidden; }
        .skill-btn .key { font-size: 9px; color: #ffd700; margin-bottom: 2px; }
        .cd-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 0%; background: rgba(0,0,0,0.8); }

        /* INTERACTION PROMPT */
        #interact-prompt { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); background: rgba(0,240,255,0.2); border: 1px solid #00f0ff; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; opacity: 0; transition: opacity 0.2s; }

        #btn-stat-toggle { position: absolute; top: 160px; left: 20px; padding: 8px 16px; background: rgba(0,240,255,0.2); border: 1px solid #00f0ff; color: #fff; border-radius: 8px; font-weight: 700; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="profile-card">
            <div class="card-header">
                <span>LV. <span id="val-level">1</span></span>
                <span style="color:#ffd700;">💰 <span id="val-gold">0</span></span>
            </div>
            <div class="bar-wrap"><div id="hp-bar" class="bar-inner" style="width:100%;"></div><div id="txt-hp" class="bar-label">100 / 100</div></div>
            <div class="bar-wrap"><div id="mp-bar" class="bar-inner" style="width:100%;"></div><div id="txt-mp" class="bar-label">50 / 50</div></div>
            <div class="bar-wrap" style="height:6px; margin-top:6px;"><div id="exp-bar" class="bar-inner" style="width:0%;"></div></div>
        </div>

        <button id="btn-stat-toggle" onclick="toggleStatsModal()">스탯 / 능력치 (C)</button>

        <div id="quest-tracker">
            <h4>📜 현재 퀘스트</h4>
            <p id="quest-desc">NPC를 찾아가 퀘스트를 받으세요.</p>
            <p id="quest-progress" style="color:#00f0ff; font-weight:800; margin-top:4px;"></p>
        </div>

        <div id="interact-prompt">대화하기 [E]</div>

        <div class="skill-bar">
            <div class="skill-btn" onclick="useSkill('Z')"><span class="key">[Z]</span>기본 참격<div id="cd-z" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('X')"><span class="key">[X]</span>화염 연격<div id="cd-x" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('C')"><span class="key">[C]</span>용권풍<div id="cd-c" class="cd-overlay"></div></div>
            <div class="skill-btn" onclick="useSkill('V')"><span class="key">[V]</span>운석 낙하<div id="cd-v" class="cd-overlay"></div></div>
        </div>

        <div id="stats-modal">
            <h3 style="color:#00f0ff; margin-bottom:12px;">능력치 배분 (포인트: <span id="val-stat-pts">0</span>)</h3>
            <div class="stat-row">
                <span>⚔️ 근력 (Melee): <b id="val-stat-str">1</b></span>
                <button class="stat-btn" onclick="addStat('str')">+</button>
            </div>
            <div class="stat-row">
                <span>🛡️ 방어력 (Defense): <b id="val-stat-def">1</b></span>
                <button class="stat-btn" onclick="addStat('def')">+</button>
            </div>
            <div class="stat-row">
                <span>🔥 악마의 열매 (Fruit): <b id="val-stat-frt">1</b></span>
                <button class="stat-btn" onclick="addStat('frt')">+</button>
            </div>
            <button onclick="toggleStatsModal()" style="width:100%; padding:10px; margin-top:10px; background:#ff0055; border:none; color:#fff; border-radius:8px; font-weight:800; cursor:pointer;">닫기</button>
        </div>
    </div>

    <script>
        // --- Game State & Save System ---
        const DEFAULT_STATE = {
            level: 1, exp: 0, maxExp: 100, gold: 0, statPoints: 0,
            str: 1, def: 1, frt: 1,
            hp: 100, mp: 50,
            quest: { active: false, target: 3, current: 0, rewardGold: 200, rewardExp: 150 }
        };

        let playerState = JSON.parse(localStorage.getItem('GS_RPG_SAVE')) || { ...DEFAULT_STATE };

        function saveGame() {
            localStorage.setItem('GS_RPG_SAVE', JSON.stringify(playerState));
        }

        function getMaxHp() { return 100 + (playerState.def - 1) * 25; }
        function getMaxMp() { return 50 + (playerState.frt - 1) * 15; }
        function getMeleeDmg() { return 15 + playerState.str * 8; }
        function getSkillDmg() { return 25 + playerState.frt * 14; }

        // --- Three.js Engine Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);
        scene.fog = new THREE.FogExp2(0x020617, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(40, 60, 20);
        sun.castShadow = true;
        scene.add(sun);

        // Ground & Island
        const island = new THREE.Mesh(new THREE.CylinderGeometry(45, 48, 2, 32), new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 }));
        island.position.y = -1; island.receiveShadow = true; scene.add(island);

        // Player Model
        const playerGroup = new THREE.Group();
        const pMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({ color: 0x00f0ff }));
        pMesh.position.y = 1; pMesh.castShadow = true; playerGroup.add(pMesh);
        scene.add(playerGroup);

        // Quest NPC Model
        const npcGroup = new THREE.Group();
        const npcMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 2, 16), new THREE.MeshStandardMaterial({ color: 0xffd700 }));
        npcMesh.position.y = 1; npcGroup.add(npcMesh);
        npcGroup.position.set(0, 0, -8);
        scene.add(npcGroup);

        // Enemies
        const enemies = [];
        function spawnEnemy(x, z) {
            const eGroup = new THREE.Group();
            const eMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 1.2), new THREE.MeshStandardMaterial({ color: 0xff0055 }));
            eMesh.position.y = 1.1; eMesh.castShadow = true; eGroup.add(eMesh);
            eGroup.position.set(x, 0, z);
            scene.add(eGroup);

            enemies.push({ group: eGroup, hp: 80, maxHp: 80, alive: true, spawnX: x, spawnZ: z, atkTimer: 0 });
        }

        // Spawn Initial Enemies
        spawnEnemy(12, -10);
        spawnEnemy(-14, -12);
        spawnEnemy(10, 10);

        // --- Controls & Logic ---
        const keys = {};
        const cd = { Z: 0, X: 0, C: 0, V: 0 };

        window.addEventListener('keydown', e => {
            const k = e.key.toUpperCase();
            keys[k] = true;
            if (k === 'E') checkNPCInteract();
            if (k === 'C' && !keys['CONTROL']) toggleStatsModal();
            if (['Z','X','C','V'].includes(k)) useSkill(k);
        });
        window.addEventListener('keyup', e => keys[e.key.toUpperCase()] = false);

        function toggleStatsModal() {
            document.getElementById('stats-modal').classList.toggle('active');
        }

        function addStat(type) {
            if (playerState.statPoints <= 0) return;
            playerState.statPoints--;
            playerState[type]++;
            updateUI();
            saveGame();
        }

        function useSkill(type) {
            if (cd[type] > 0) return;
            const mpCost = type === 'Z' ? 0 : (type === 'X' ? 10 : (type === 'C' ? 20 : 35));
            if (playerState.mp < mpCost) return;

            playerState.mp -= mpCost;

            if (type === 'Z') {
                cd.Z = 0.6;
                attackEnemies(getMeleeDmg(), 4);
            } else if (type === 'X') {
                cd.X = 3.0;
                attackEnemies(getSkillDmg() * 1.3, 6);
            } else if (type === 'C') {
                cd.C = 5.0;
                attackEnemies(getSkillDmg() * 1.8, 9);
            } else if (type === 'V') {
                cd.V = 9.0;
                attackEnemies(getSkillDmg() * 2.8, 14);
            }
            updateUI();
        }

        function attackEnemies(damage, range) {
            enemies.forEach(e => {
                if (!e.alive) return;
                const dist = playerGroup.position.distanceTo(e.group.position);
                if (dist <= range) {
                    e.hp -= damage;
                    if (e.hp <= 0) {
                        e.alive = false;
                        scene.remove(e.group);
                        onEnemyKilled();
                        setTimeout(() => {
                            e.hp = e.maxHp; e.alive = true;
                            e.group.position.set(e.spawnX, 0, e.spawnZ);
                            scene.add(e.group);
                        }, 5000);
                    }
                }
            });
        }

        function onEnemyKilled() {
            gainExp(40);
            playerState.gold += 50;

            if (playerState.quest.active) {
                playerState.quest.current++;
                if (playerState.quest.current >= playerState.quest.target) {
                    playerState.quest.active = false;
                    gainExp(playerState.quest.rewardExp);
                    playerState.gold += playerState.quest.rewardGold;
                    alert('🎉 퀘스트 완료! 보상이 지급되었습니다.');
                }
            }
            updateUI();
            saveGame();
        }

        function gainExp(amount) {
            playerState.exp += amount;
            if (playerState.exp >= playerState.maxExp) {
                playerState.exp -= playerState.maxExp;
                playerState.level++;
                playerState.statPoints += 3;
                playerState.maxExp = Math.floor(playerState.maxExp * 1.4);
                playerState.hp = getMaxHp();
                playerState.mp = getMaxMp();
            }
        }

        function checkNPCInteract() {
            const dist = playerGroup.position.distanceTo(npcGroup.position);
            if (dist < 4) {
                if (!playerState.quest.active) {
                    playerState.quest.active = true;
                    playerState.quest.current = 0;
                    alert('📜 퀘스트 수락: 해적 몬스터 3마리를 처치하세요!');
                    updateUI();
                    saveGame();
                }
            }
        }

        function updateUI() {
            const maxHp = getMaxHp(), maxMp = getMaxMp();
            document.getElementById('val-level').innerText = playerState.level;
            document.getElementById('val-gold').innerText = playerState.gold;
            document.getElementById('txt-hp').innerText = `${Math.ceil(playerState.hp)} / ${maxHp}`;
            document.getElementById('hp-bar').style.width = `${(playerState.hp / maxHp) * 100}%`;
            document.getElementById('txt-mp').innerText = `${Math.ceil(playerState.mp)} / ${maxMp}`;
            document.getElementById('mp-bar').style.width = `${(playerState.mp / maxMp) * 100}%`;
            document.getElementById('exp-bar').style.width = `${(playerState.exp / playerState.maxExp) * 100}%`;

            document.getElementById('val-stat-pts').innerText = playerState.statPoints;
            document.getElementById('val-stat-str').innerText = playerState.str;
            document.getElementById('val-stat-def').innerText = playerState.def;
            document.getElementById('val-stat-frt').innerText = playerState.frt;

            const q = playerState.quest;
            document.getElementById('quest-desc').innerText = q.active ? `해적 몬스터 처치 (${q.current}/${q.target})` : 'NPC [E]를 통해 퀘스트를 받으세요.';
            document.getElementById('quest-progress').innerText = q.active ? `보상: 💰${q.rewardGold} / EXP ${q.rewardExp}` : '';
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Cooldown handling
            ['Z','X','C','V'].forEach(k => {
                if (cd[k] > 0) {
                    cd[k] = Math.max(0, cd[k] - delta);
                    const maxCd = k === 'Z' ? 0.6 : (k === 'X' ? 3.0 : (k === 'C' ? 5.0 : 9.0));
                    document.getElementById(`cd-${k.toLowerCase()}`).style.height = `${(cd[k] / maxCd) * 100}%`;
                }
            });

            // Player Movement
            const moveSpeed = 12 * delta;
            let moveX = 0, moveZ = 0;
            if (keys['W']) moveZ -= 1;
            if (keys['S']) moveZ += 1;
            if (keys['A']) moveX -= 1;
            if (keys['D']) moveX += 1;

            if (moveX !== 0 || moveZ !== 0) {
                const dir = new THREE.Vector3(moveX, 0, moveZ).normalize();
                playerGroup.position.x += dir.x * moveSpeed;
                playerGroup.position.z += dir.z * moveSpeed;
                playerGroup.rotation.y = Math.atan2(dir.x, dir.z);
            }

            // NPC Interaction Prompt
            const npcDist = playerGroup.position.distanceTo(npcGroup.position);
            document.getElementById('interact-prompt').style.opacity = npcDist < 4 ? '1' : '0';

            // Mana Regen
            if (playerState.mp < getMaxMp()) {
                playerState.mp = Math.min(getMaxMp(), playerState.mp + delta * 5);
                updateUI();
            }

            // Camera Following
            camera.position.set(playerGroup.position.x, playerGroup.position.y + 18, playerGroup.position.z + 20);
            camera.lookAt(playerGroup.position);

            renderer.render(scene, camera);
        }

        updateUI();
        animate();
    </script>
</body>
</html>
