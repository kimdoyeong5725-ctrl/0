<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bleach: Soul Dungeon (Soul Knight Style)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #050811; font-family: 'Segoe UI', sans-serif; color: #fff; }

        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* HUD UI */
        #top-hud { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; }
        .panel-box { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); border: 1.5px solid #00b4d8; border-radius: 12px; padding: 12px; width: 280px; pointer-events: auto; }
        .bar-container { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.15); border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .bar-hp { width: 100%; height: 100%; background: linear-gradient(90deg, #ef233c, #d90429); transition: width 0.2s; }
        .bar-mp { width: 100%; height: 100%; background: linear-gradient(90deg, #00b4d8, #90e0ef); transition: width 0.2s; }

        /* 소울나이트 미니맵 HUD */
        #minimap-box { background: rgba(10, 15, 29, 0.9); border: 2px solid #00b4d8; border-radius: 8px; padding: 8px; width: 110px; height: 110px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 4px; }
        .map-cell { background: rgba(255,255,255,0.05); border-radius: 4px; border: 1px solid transparent; }
        .map-cell.active { background: #00b4d8; border-color: #fff; box-shadow: 0 0 8px #00b4d8; }
        .map-cell.cleared { background: #38bdf8; opacity: 0.5; }
        .map-cell.boss { background: #ef233c; }

        /* 컨트롤러 UI */
        #joystick-area { position: absolute; bottom: 30px; left: 30px; width: 110px; height: 110px; background: rgba(0, 180, 216, 0.15); border: 2px solid rgba(144, 224, 239, 0.5); border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #joystick-handle { width: 45px; height: 45px; background: radial-gradient(circle, #ffffff, #90e0ef); border-radius: 50%; box-shadow: 0 0 15px #00b4d8; }

        .action-area { position: absolute; bottom: 20px; right: 20px; width: 200px; height: 200px; pointer-events: none; }
        .btn-action { position: absolute; border-radius: 50%; color: #fff; font-weight: bold; display: flex; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; background: rgba(15, 23, 42, 0.9); border: 1.5px solid #00b4d8; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); font-size: 13px; }
        #btn-attack { width: 80px; height: 80px; bottom: 0; right: 0; background: radial-gradient(circle, #00b4d8, #0077b6); font-size: 16px; }
        #btn-skill { width: 55px; height: 55px; bottom: 90px; right: 10px; background: radial-gradient(circle, #f72585, #7209b7); }
        #btn-dash { width: 50px; height: 50px; bottom: 10px; right: 95px; }

        #toast-msg { position: absolute; top: 20%; width: 100%; text-align: center; color: #fff; font-size: 22px; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 10px #00b4d8; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="top-hud">
            <div class="panel-box">
                <div>❄️ 토시로 <span id="ui-chapter" style="color:#ffd700; font-weight:bold; float:right;">CHAPTER 1-1</span></div>
                <div class="bar-container"><div id="ui-hp" class="bar-hp"></div></div>
                <div class="bar-container"><div id="ui-mp" class="bar-mp"></div></div>
            </div>
            <div id="minimap-box">
                <div class="map-cell" id="cell-0"></div><div class="map-cell" id="cell-1"></div><div class="map-cell" id="cell-2"></div>
                <div class="map-cell" id="cell-3"></div><div class="map-cell" id="cell-4"></div><div class="map-cell" id="cell-5"></div>
                <div class="map-cell" id="cell-6"></div><div class="map-cell" id="cell-7"></div><div class="map-cell" id="cell-8"></div>
            </div>
        </div>

        <div id="toast-msg">방 안의 적을 모두 처치하세요!</div>

        <div id="joystick-area"><div id="joystick-handle"></div></div>
        <div class="action-area">
            <div id="btn-dash" class="btn-action">순보</div>
            <div id="btn-skill" class="btn-action">빙륜환</div>
            <div id="btn-attack" class="btn-action">공격</div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const playerState = { hp: 300, maxHp: 300, mp: 100, maxMp: 100, chapter: 1, currentRoomIndex: 4 };
            
            // 챕터 테마 정보
            const CHAPTER_THEMES = {
                1: { name: "1. 카라쿠라 마을", wallColor: 0x334155, floorColor: 0x1e293b, enemyColor: 0xef233c },
                2: { name: "2. 소울 소사이어티", wallColor: 0x475569, floorColor: 0x0f172a, enemyColor: 0xfb8500 },
                3: { name: "3. 웨코문도 (라스 노체스)", wallColor: 0x94a3b8, floorColor: 0x38bdf8, enemyColor: 0x00ff88 },
                4: { name: "4. 천년혈전 (반덴라이히)", wallColor: 0x1e1b4b, floorColor: 0x020617, enemyColor: 0xd90429 }
            };

            // 3x3 방 구조 (4번이 중앙 시작 방, 8번이 보스 방)
            const dungeonRooms = [
                { id: 0, type: "mob", cleared: false }, { id: 1, type: "mob", cleared: false }, { id: 2, type: "reward", cleared: true },
                { id: 3, type: "mob", cleared: false }, { id: 4, type: "start", cleared: true }, { id: 5, type: "mob", cleared: false },
                { id: 6, type: "reward", cleared: true }, { id: 7, type: "mob", cleared: false }, { id: 8, type: "boss", cleared: false }
            ];

            // Scene 설정
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050811);

            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 22, 18);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(10, 20, 10);
            scene.add(light);

            // 던전 방 객체 생성
            const roomGroup = new THREE.Group();
            scene.add(roomGroup);
            let activeEnemies = [];
            let activeDoors = [];

            function buildRoom(roomData) {
                while(roomGroup.children.length > 0) { roomGroup.remove(roomGroup.children[0]); }
                activeEnemies = [];
                activeDoors = [];

                const theme = CHAPTER_THEMES[playerState.chapter];
                
                // 바닥
                const floor = new THREE.Mesh(new THREE.BoxGeometry(26, 0.5, 26), new THREE.MeshStandardMaterial({ color: theme.floorColor }));
                floor.position.y = -0.25;
                roomGroup.add(floor);

                // 벽면 (소울나이트 스타일 사방이 막힌 방)
                const wallMat = new THREE.MeshStandardMaterial({ color: theme.wallColor });
                const wallNorth = new THREE.Mesh(new THREE.BoxGeometry(26, 4, 1), wallMat); wallNorth.position.set(0, 2, -13);
                const wallSouth = new THREE.Mesh(new THREE.BoxGeometry(26, 4, 1), wallMat); wallSouth.position.set(0, 2, 13);
                const wallEast = new THREE.Mesh(new THREE.BoxGeometry(1, 4, 26), wallMat); wallEast.position.set(13, 2, 0);
                const wallWest = new THREE.Mesh(new THREE.BoxGeometry(1, 4, 26), wallMat); wallWest.position.set(-13, 2, 0);
                roomGroup.add(wallNorth, wallSouth, wallEast, wallWest);

                // 적 생성 (전투 방일 경우)
                if (!roomData.cleared && roomData.type === "mob") {
                    spawnEnemies(3 + playerState.chapter, theme.enemyColor, false);
                } else if (!roomData.cleared && roomData.type === "boss") {
                    spawnEnemies(1, 0xff0055, true);
                } else {
                    openDoors();
                }

                updateMinimap();
            }

            function spawnEnemies(count, colorHex, isBoss) {
                for (let i = 0; i < count; i++) {
                    const size = isBoss ? 2.5 : 1.2;
                    const enemyMesh = new THREE.Mesh(
                        new THREE.BoxGeometry(size, size, size),
                        new THREE.MeshStandardMaterial({ color: colorHex })
                    );
                    enemyMesh.position.set((Math.random() - 0.5) * 16, size/2, (Math.random() - 0.5) * 16);
                    roomGroup.add(enemyMesh);
                    activeEnemies.push({ mesh: enemyMesh, hp: isBoss ? 800 : 120, isBoss: isBoss });
                }
            }

            function openDoors() {
                // 상하좌우 이동 출입구 생성
                const doorMat = new THREE.MeshBasicMaterial({ color: 0x00b4d8 });
                const gate = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 4), doorMat);
                gate.position.set(0, 0, -10);
                roomGroup.add(gate);
                activeDoors.push(gate);
            }

            // 플레이어
            const player = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.8), new THREE.MeshStandardMaterial({ color: 0x00f0ff }));
            player.position.set(0, 0.9, 8);
            scene.add(player);

            // 미니맵 업데이트
            function updateMinimap() {
                dungeonRooms.forEach((r, idx) => {
                    const cell = document.getElementById(`cell-${idx}`);
                    cell.className = "map-cell";
                    if (idx === playerState.currentRoomIndex) cell.classList.add("active");
                    else if (r.cleared) cell.classList.add("cleared");
                    else if (r.type === "boss") cell.classList.add("boss");
                });
            }

            function showToast(msg) {
                const t = document.getElementById('toast-msg');
                t.innerText = msg; t.style.opacity = '1';
                setTimeout(() => t.style.opacity = '0', 1800);
            }

            function checkRoomClear() {
                if (activeEnemies.length === 0 && !dungeonRooms[playerState.currentRoomIndex].cleared) {
                    dungeonRooms[playerState.currentRoomIndex].cleared = true;
                    showToast("🔓 방 클리어! 다음 문이 열렸습니다.");
                    openDoors();
                    updateMinimap();

                    // 보스방 클리어 시 다음 챕터
                    if (dungeonRooms[playerState.currentRoomIndex].type === "boss") {
                        setTimeout(() => {
                            playerState.chapter = (playerState.chapter % 4) + 1;
                            playerState.currentRoomIndex = 4;
                            dungeonRooms.forEach(r => r.cleared = false);
                            dungeonRooms[4].cleared = true;
                            document.getElementById('ui-chapter').innerText = `CHAPTER ${playerState.chapter}-1`;
                            showToast(`🎉 챕터 ${playerState.chapter} 진입!`);
                            buildRoom(dungeonRooms[4]);
                        }, 1500);
                    }
                }
            }

            // 공격 조작
            document.getElementById('btn-attack').onclick = () => {
                activeEnemies.forEach((e, idx) => {
                    if (player.position.distanceTo(e.mesh.position) < 4.0) {
                        e.hp -= 60;
                        e.mesh.position.x += (e.mesh.position.x - player.position.x) * 0.3; // 넉백
                        if (e.hp <= 0) {
                            roomGroup.remove(e.mesh);
                            activeEnemies.splice(idx, 1);
                        }
                    }
                });
                checkRoomClear();
            };

            // 조이스틱 이동
            let moveVec = { x: 0, z: 0 };
            const joyArea = document.getElementById('joystick-area');
            const joyHandle = document.getElementById('joystick-handle');
            let dragging = false, startX = 0, startY = 0;

            const startMove = (e) => { dragging = true; const t = e.touches ? e.touches[0] : e; startX = t.clientX; startY = t.clientY; };
            const doMove = (e) => {
                if (!dragging) return;
                const t = e.touches ? e.touches[0] : e;
                let dx = t.clientX - startX, dy = t.clientY - startY;
                const dist = Math.sqrt(dx*dx + dy*dy), maxR = 30;
                if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
                joyHandle.style.transform = `translate(${dx}px, ${dy}px)`;
                moveVec.x = dx / maxR; moveVec.z = dy / maxR;
            };
            const endMove = () => { dragging = false; joyHandle.style.transform = 'translate(0,0)'; moveVec = { x: 0, z: 0 }; };

            joyArea.addEventListener('touchstart', startMove); window.addEventListener('touchmove', doMove); window.addEventListener('touchend', endMove);
            joyArea.addEventListener('mousedown', startMove); window.addEventListener('mousemove', doMove); window.addEventListener('mouseup', endMove);

            // 초기 시작 방 로드
            buildRoom(dungeonRooms[4]);

            // 게임 루프
            function animate() {
                requestAnimationFrame(animate);

                // 플레이어 이동
                if (moveVec.x !== 0 || moveVec.z !== 0) {
                    player.position.x = Math.max(-11, Math.min(11, player.position.x + moveVec.x * 0.18));
                    player.position.z = Math.max(-11, Math.min(11, player.position.z + moveVec.z * 0.18));
                }

                // 방 이동 게이트 감지
                activeDoors.forEach(gate => {
                    if (player.position.distanceTo(gate.position) < 1.8) {
                        playerState.currentRoomIndex = (playerState.currentRoomIndex + 1) % 9;
                        player.position.set(0, 0.9, 8);
                        buildRoom(dungeonRooms[playerState.currentRoomIndex]);
                        showToast(`새로운 방 진입 (방 번호: ${playerState.currentRoomIndex + 1})`);
                    }
                });

                // 적 추적 AI
                activeEnemies.forEach(e => {
                    e.mesh.position.lerp(player.position, 0.015);
                });

                renderer.render(scene, camera);
            }

            animate();
        });
    </script>
</body>
</html>
