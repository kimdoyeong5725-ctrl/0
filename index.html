<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ice Captain - Bleach Saga Beyond</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #0b132b; font-family: 'Segoe UI', sans-serif; color: #fff; }

        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* HUD UI */
        #top-hud { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; }
        .panel-box { background: rgba(10, 20, 38, 0.85); backdrop-filter: blur(8px); border: 1.5px solid #00b4d8; border-radius: 12px; padding: 12px; width: 310px; pointer-events: auto; box-shadow: 0 0 15px rgba(0, 180, 216, 0.4); }
        .gold-text { color: #ffd700; font-weight: bold; }
        .bar-container { width: 100%; height: 9px; background: rgba(255, 255, 255, 0.15); border-radius: 5px; overflow: hidden; margin-top: 6px; }
        .bar-fill-hp { width: 100%; height: 100%; background: linear-gradient(90deg, #ef233c, #d90429); transition: width 0.2s; }
        .bar-fill-mp { width: 100%; height: 100%; background: linear-gradient(90deg, #00b4d8, #90e0ef); transition: width 0.2s; }
        .quest-box { margin-top: 8px; background: rgba(0, 180, 216, 0.25); border-left: 4px solid #90e0ef; padding: 6px 10px; font-size: 11px; font-weight: bold; border-radius: 0 6px 6px 0; }

        /* 보스 HUD UI */
        #boss-hud { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 60%; max-width: 500px; text-align: center; display: none; }
        #boss-name { font-size: 16px; font-weight: 900; color: #ff2a6d; text-shadow: 0 0 10px #ff2a6d, 0 0 20px #000; letter-spacing: 2px; margin-bottom: 4px; }
        .boss-bar-bg { width: 100%; height: 18px; background: rgba(0,0,0,0.8); border: 2px solid #ff2a6d; border-radius: 9px; overflow: hidden; box-shadow: 0 0 15px rgba(255, 42, 109, 0.5); }
        #boss-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff2a6d, #ffb703); transition: width 0.15s ease-out; }

        /* 콤보 UI */
        #combo-container { position: absolute; top: 22%; left: 30px; opacity: 0; transition: opacity 0.2s, transform 0.1s; transform: scale(1); pointer-events: none; }
        #combo-count { font-size: 52px; font-weight: 900; color: #90e0ef; text-shadow: 0 0 15px #00b4d8, 0 0 25px #000; font-style: italic; }
        #combo-text { font-size: 14px; font-weight: bold; color: #ffffff; letter-spacing: 2px; }

        /* 데미지 폰트 */
        #damage-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .damage-text { position: absolute; font-weight: 900; font-style: italic; transform: translate(-50%, -100%); animation: floatUp 0.8s ease-out forwards; text-shadow: 0 2px 8px #000; }
        .damage-normal { font-size: 24px; color: #ffffff; text-shadow: 0 0 8px #00b4d8; }
        .damage-crit { font-size: 36px; color: #ffb703; text-shadow: 0 0 12px #fb8500, 0 0 20px #fff; }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
            30% { transform: translate(-50%, -100%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -180%) scale(1.0); }
        }

        /* 컨트롤러 UI */
        #joystick-area { position: absolute; bottom: 35px; left: 30px; width: 110px; height: 110px; background: rgba(0, 180, 216, 0.15); border: 2px solid rgba(144, 224, 239, 0.6); border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        #joystick-handle { width: 45px; height: 45px; background: radial-gradient(circle, #ffffff, #90e0ef); border-radius: 50%; box-shadow: 0 0 15px #00b4d8; }

        .action-area { position: absolute; bottom: 20px; right: 20px; width: 280px; height: 280px; pointer-events: none; }
        .btn-action { position: absolute; border-radius: 50%; color: #fff; font-weight: bold; display: flex; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; background: rgba(10, 20, 38, 0.9); border: 1.5px solid #00b4d8; box-shadow: 0 0 15px rgba(0, 180, 216, 0.4); font-size: 11px; text-shadow: 0 0 5px #000; overflow: hidden; }
        .btn-action:active { transform: scale(0.92); }
        
        .cooldown-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: 900; color: #90e0ef; opacity: 0; pointer-events: none; }

        #btn-attack { width: 85px; height: 85px; bottom: 0; right: 0; font-size: 16px; background: radial-gradient(circle, #00b4d8, #0077b6); border-color: #90e0ef; box-shadow: 0 0 20px #00b4d8; }
        #btn-dodge { width: 50px; height: 50px; bottom: 5px; right: 105px; }
        #btn-skill1 { width: 58px; height: 58px; bottom: 95px; right: 0; background: radial-gradient(circle, #48cae4, #0077b6); }
        #btn-skill2 { width: 58px; height: 58px; bottom: 100px; right: 75px; background: radial-gradient(circle, #7209b7, #3a0ca3); }
        #btn-ult { width: 70px; height: 70px; bottom: 165px; right: 15px; border-color: #e0aaff; background: radial-gradient(circle, #f72585, #7209b7); box-shadow: 0 0 25px #f72585; font-size: 11px; }

        #toast-msg { position: absolute; top: 18%; width: 100%; text-align: center; color: #ffffff; font-size: 24px; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 20; text-shadow: 0 0 15px #00b4d8, 0 0 30px #000; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="damage-container"></div>

    <div id="ui-layer">
        <div id="top-hud">
            <div class="panel-box">
                <div style="display:flex; justify-content:space-between;">
                    <span>❄️ 토시로 <b id="ui-level" style="color:#90e0ef;">Lv.1</b></span>
                    <span class="gold-text">💰 <b id="ui-gold">0</b></span>
                </div>
                <div class="bar-container"><div id="ui-hp-fill" class="bar-fill-hp"></div></div>
                <div class="bar-container"><div id="ui-mp-fill" class="bar-fill-mp"></div></div>
                <div class="quest-box">📖 <span id="ui-stage-name">1. 현세 (거대 호로)</span></div>
            </div>
        </div>

        <div id="boss-hud">
            <div id="boss-name">⚠️ BOSS: 거대 호로</div>
            <div class="boss-bar-bg"><div id="boss-bar-fill"></div></div>
        </div>

        <div id="combo-container">
            <div id="combo-count">0</div>
            <div id="combo-text">HITS!</div>
        </div>

        <div id="toast-msg">시해 [빙륜환] 해방!</div>
        <div id="joystick-area"><div id="joystick-handle"></div></div>

        <div class="action-area">
            <div id="btn-dodge" class="btn-action">순보<div id="cd-dodge" class="cooldown-mask"></div></div>
            <div id="btn-skill1" class="btn-action">군구상<div id="cd-skill1" class="cooldown-mask"></div></div>
            <div id="btn-skill2" class="btn-action">빙류성<div id="cd-skill2" class="cooldown-mask"></div></div>
            <div id="btn-ult" class="btn-action">만해각성<div id="cd-ult" class="cooldown-mask"></div></div>
            <div id="btn-attack" class="btn-action">참격</div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const state = { stage: 1, gold: 0, level: 1, hp: 150, maxHp: 150, mp: 100, maxMp: 100, atk: 85, combo: 0, comboTimer: null, isHitStopped: false };

            // 적 명단 & 적절히 밝은 배경 설정
            const STAGE_THEMES = {
                1: { name: "1. 현세 (거대 호로 & 메노스)", boss: "메노스 그랑데", color: 0x1e293b, fog: 0.006, type: 'menos' },
                2: { name: "2. 웨코문도 (아란칼 군단)", boss: "아란칼 3선발", color: 0x334155, fog: 0.005, type: 'arrancar' },
                3: { name: "3. 라스 노체스 (에스파다)", boss: "제 4에스파다 우르키오라", color: 0x283593, fog: 0.004, type: 'espada' },
                4: { name: "4. 쌍삭대 (아이젠 소스케)", boss: "붕옥 융합 아이젠", color: 0x415a77, fog: 0.005, type: 'aizen' },
                5: { name: "5. 정령정 (호정 13대 수련)", boss: "총대장 야마모토", color: 0x1d2d44, fog: 0.005, type: 'shinigami' },
                6: { name: "6. 반덴라이히 (퀸시 성십자기사단)", boss: "성십자기사단 슈테른리터", color: 0x1e1b4b, fog: 0.004, type: 'quincy' },
                7: { name: "7. 영왕궁 (최종 결전)", boss: "유하바하 (전지전능)", color: 0x31103f, fog: 0.005, type: 'yhwach' }
            };

            const cooldowns = {
                dodge: { max: 2, current: 0, el: document.getElementById('cd-dodge') },
                skill1: { max: 4, current: 0, el: document.getElementById('cd-skill1') },
                skill2: { max: 6, current: 0, el: document.getElementById('cd-skill2') },
                ult: { max: 12, current: 0, el: document.getElementById('cd-ult') }
            };

            function triggerCooldown(key) {
                const cd = cooldowns[key];
                cd.current = cd.max;
                cd.el.style.opacity = '1';
                cd.el.innerText = cd.current;

                const timer = setInterval(() => {
                    cd.current -= 1;
                    if (cd.current <= 0) { clearInterval(timer); cd.el.style.opacity = '0'; } 
                    else { cd.el.innerText = cd.current; }
                }, 1000);
            }

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            function playSound(type) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                if (type === 'slash') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(900, now); osc.frequency.exponentialRampToValueAtTime(150, now + 0.15);
                    gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                } else if (type === 'ult') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(1100, now + 0.7);
                    gain.gain.setValueAtTime(0.5, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.7);
                    osc.start(now); osc.stop(now + 0.7);
                }
            }

            function triggerHitStop(duration = 45) {
                state.isHitStopped = true;
                setTimeout(() => { state.isHitStopped = false; }, duration);
            }

            function showDamageText(pos, dmgAmount, isCrit = false) {
                const vector = pos.clone(); vector.y += 2.5; vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;

                const dmgEl = document.createElement('div');
                dmgEl.className = `damage-text ${isCrit ? 'damage-crit' : 'damage-normal'}`;
                dmgEl.innerText = isCrit ? `CRITICAL! ${dmgAmount}` : dmgAmount;
                dmgEl.style.left = `${x}px`; dmgEl.style.top = `${y}px`;

                document.getElementById('damage-container').appendChild(dmgEl);
                setTimeout(() => dmgEl.remove(), 800);
            }

            function addCombo() {
                state.combo++;
                const comboEl = document.getElementById('combo-container');
                document.getElementById('combo-count').innerText = state.combo;
                comboEl.style.opacity = '1';
                comboEl.style.transform = 'scale(1.2)';
                setTimeout(() => comboEl.style.transform = 'scale(1)', 100);

                clearTimeout(state.comboTimer);
                state.comboTimer = setTimeout(() => { comboEl.style.opacity = '0'; state.combo = 0; }, 2000);
            }

            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(STAGE_THEMES[1].color);
            scene.fog = new THREE.FogExp2(STAGE_THEMES[1].color, STAGE_THEMES[1].fog);

            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            let targetOffset = new THREE.Vector3(0, 11, 14);
            let cameraOffset = targetOffset.clone();

            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // 적절히 선명하고 화려한 블룸 설정 (0.65)
            const composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.65, 0.35, 0.2);
            composer.addPass(bloomPass);

            // 밝아진 광원 조절
            scene.add(new THREE.AmbientLight(0xffffff, 1.2)); 
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
            mainLight.position.set(25, 45, 20);
            mainLight.castShadow = true;
            scene.add(mainLight);

            // 바닥 및 지형물 재질
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x223040, roughness: 0.5, metalness: 0.2 });
            const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(160, 160), floorMat);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.receiveShadow = true;
            scene.add(floorMesh);

            let envGroup = new THREE.Group();
            scene.add(envGroup);

            // 맵 지형지물 복구 및 연출 강화
            function buildEnvironmentObjects(stage) {
                while(envGroup.children.length > 0) { envGroup.remove(envGroup.children[0]); }

                if (stage === 1) { // 현세: 도심 빌딩 & 가로등
                    floorMat.color.setHex(0x22252a);
                    for(let i=0; i<8; i++) {
                        const bldg = new THREE.Mesh(new THREE.BoxGeometry(10, 20 + Math.random()*15, 10), new THREE.MeshStandardMaterial({color: 0x334155, roughness: 0.3}));
                        bldg.position.set((i%2 === 0 ? -28 : 28), bldg.geometry.parameters.height/2, -50 + i*14);
                        envGroup.add(bldg);
                    }
                } else if (stage === 2) { // 웨코문도: 석화 나무 & 바위
                    floorMat.color.setHex(0x475569);
                    for(let i=0; i<12; i++) {
                        const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(2.5 + Math.random()*2), new THREE.MeshStandardMaterial({color: 0x94a3b8}));
                        rock.position.set((Math.random()-0.5)*70, 1.5, -40 + (Math.random()-0.5)*60);
                        envGroup.add(rock);
                    }
                } else if (stage === 3) { // 라스 노체스: 하얀 기둥 신전
                    floorMat.color.setHex(0xcbd5e1);
                    for(let i=0; i<10; i++) {
                        const pillar = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 18), new THREE.MeshStandardMaterial({color: 0xf8fafc}));
                        pillar.position.set((i%2 === 0 ? -22 : 22), 9, -50 + i*12);
                        envGroup.add(pillar);
                    }
                } else if (stage === 4) { // 쌍삭대: 처형대 제단 & 횃불
                    floorMat.color.setHex(0x334155);
                    const altar = new THREE.Mesh(new THREE.BoxGeometry(14, 2, 14), new THREE.MeshStandardMaterial({color: 0x64748b}));
                    altar.position.set(0, 1, -25); envGroup.add(altar);
                } else if (stage === 5) { // 정령정: 동양풍 기와 문 & 담장
                    floorMat.color.setHex(0x1e293b);
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(100, 12, 3), new THREE.MeshStandardMaterial({color: 0x475569}));
                    wall.position.set(0, 6, -40); envGroup.add(wall);
                } else if (stage === 6) { // 반덴라이히: 퀸시 얼음 궁전 기둥
                    floorMat.color.setHex(0x1e1b4b);
                    for(let i=0; i<8; i++) {
                        const crystal = new THREE.Mesh(new THREE.OctahedronGeometry(3.0), new THREE.MeshStandardMaterial({color: 0x38bdf8, emissive: 0x0284c7, emissiveIntensity: 0.8}));
                        crystal.scale.set(1, 4, 1);
                        crystal.position.set((i%2 === 0 ? -20 : 20), 6, -40 + i*12);
                        envGroup.add(crystal);
                    }
                } else if (stage === 7) { // 영왕궁: 신성한 부유석 & 거대 문
                    floorMat.color.setHex(0x31103f);
                    for(let i=0; i<6; i++) {
                        const floatRock = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 6), new THREE.MeshStandardMaterial({color: 0xa855f7, emissive: 0x6b21a8, emissiveIntensity: 0.5}));
                        floatRock.position.set((i%2 === 0 ? -24 : 24), 8 + i, -35 + i*8);
                        envGroup.add(floatRock);
                    }
                }
            }

            buildEnvironmentObjects(1);

            // 보스 모델링 연출 (적 종류별 외형 변경)
            const monsters = [];

            function createBossForStage(stage) {
                const group = new THREE.Group();
                const theme = STAGE_THEMES[stage];

                if (stage === 1) { // 메노스 그랑데 (장대하게 긴 검은 몸체 + 고깔 가면)
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 2.5, 12), new THREE.MeshStandardMaterial({ color: 0x050505 }));
                    body.position.y = 6; group.add(body);
                    const mask = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 8), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                    mask.rotation.x = Math.PI; mask.position.set(0, 11, 0.5); group.add(mask);
                    const eye = new THREE.PointLight(0xff0000, 3, 10); eye.position.set(0, 10, 1.2); group.add(eye);
                } else if (stage === 2 || stage === 3) { // 아란칼 / 에스파다 (백색 제복 & 가면 파편)
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 2.2), new THREE.MeshStandardMaterial({ color: 0xf8fafc }));
                    body.position.y = 1.1; group.add(body);
                    const head = new THREE.Mesh(new THREE.SphereGeometry(0.45), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
                    head.position.y = 2.3; group.add(head);
                    const maskPiece = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.2), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                    maskPiece.position.set(0.2, 2.4, 0.3); group.add(maskPiece);
                    const aura = new THREE.PointLight(stage === 3 ? 0x00ff88 : 0x0088ff, 2, 8); aura.position.y = 2.0; group.add(aura);
                } else if (stage === 4) { // 아이젠 소스케 (붕옥 융합 형태 - 화이트/바이올렛 날개)
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 2.0), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x3b0764, emissiveIntensity: 0.5 }));
                    body.position.y = 1.0; group.add(body);
                    for(let i=-1; i<=1; i+=2) {
                        const wing = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.5, 1.2), new THREE.MeshStandardMaterial({ color: 0xe9d5ff, emissive: 0xa855f7, emissiveIntensity: 0.8 }));
                        wing.position.set(i*0.8, 1.8, -0.2); wing.rotation.z = i*0.5; group.add(wing);
                    }
                } else if (stage === 5) { // 호정 13대 사신 (검은 사패장 + 도포)
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.8, 2.0), new THREE.MeshStandardMaterial({ color: 0x0f172a }));
                    body.position.y = 1.0; group.add(body);
                    const haori = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 0.6), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                    haori.position.set(0, 1.2, 0); group.add(haori);
                } else if (stage === 6) { // 퀸시 (순백 제복 + 신성 십자가 후광)
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 2.0), new THREE.MeshStandardMaterial({ color: 0x38bdf8, emissive: 0x0284c7, emissiveIntensity: 0.3 }));
                    body.position.y = 1.0; group.add(body);
                    const cross = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.2, 0.1), new THREE.MeshBasicMaterial({ color: 0x38bdf8 }));
                    cross.position.set(0, 2.2, -0.3); group.add(cross);
                } else if (stage === 7) { // 유하바하 (검은 망토 + 붉은 그림자 오라)
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.9, 2.4), new THREE.MeshStandardMaterial({ color: 0x020617, emissive: 0xd90429, emissiveIntensity: 0.6 }));
                    body.position.y = 1.2; group.add(body);
                    const aura = new THREE.PointLight(0xd90429, 3.5, 10); aura.position.y = 2.0; group.add(aura);
                }

                group.position.set(0, 0, -18); scene.add(group);
                monsters.push({ mesh: group, hp: 2000 + stage*800, maxHp: 2000 + stage*800, isBoss: true });
                document.getElementById('boss-hud').style.display = 'block';
                document.getElementById('boss-name').innerText = `⚠️ BOSS: ${theme.boss}`;
            }

            createBossForStage(1);

            // 화려한 스킬 이펙트 (VFX)
            const vfxList = [];
            function spawnSlashVFX(scale = 1.0, color = 0x00f0ff, type = 'slash') {
                const group = new THREE.Group();

                if (type === 'slash') { // 일반 참격
                    const arcGeo = new THREE.RingGeometry(1.2 * scale, 2.6 * scale, 32, 1, 0, Math.PI * 0.85);
                    const arcMat = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
                    const arcMesh = new THREE.Mesh(arcGeo, arcMat);
                    group.add(arcMesh);
                } else if (type === 'dragon') { // 군구상 (빙룡 형상)
                    for(let i=0; i<3; i++) {
                        const ring = new THREE.Mesh(new THREE.TorusGeometry((1.5 + i*0.8)*scale, 0.15, 16, 32), new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending }));
                        ring.rotation.x = Math.PI / 3;
                        ring.position.z = -i * 2;
                        group.add(ring);
                    }
                } else if (type === 'meteor') { // 빙류성 (낙하 폭발)
                    const sphere = new THREE.Mesh(new THREE.SphereGeometry(2.5 * scale, 16, 16), new THREE.MeshBasicMaterial({ color: color, wireframe: true, transparent: true, opacity: 0.8 }));
                    group.add(sphere);
                } else if (type === 'ult') { // 만해 (화려한 대형 얼음 결정 오라)
                    const octa = new THREE.Mesh(new THREE.OctahedronGeometry(4.0 * scale, 2), new THREE.MeshBasicMaterial({ color: 0x90e0ef, wireframe: true, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending }));
                    group.add(octa);
                }

                group.position.copy(playerGroup.position);
                group.position.y += 0.8;
                group.rotation.x = Math.PI / 2;
                group.rotation.z = playerGroup.rotation.y + Math.PI / 4;
                scene.add(group);
                vfxList.push({ mesh: group, type: 'fade', life: 0.25, maxLife: 0.25, scaleSpeed: 0.2 });
            }

            // 토시로 플레이어 모델링
            const playerGroup = new THREE.Group();
            scene.add(playerGroup);
            const playerBody = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x0f172a }));
            playerBody.position.y = 0.6; playerGroup.add(playerBody);
            const playerHead = new THREE.Mesh(new THREE.SphereGeometry(0.28), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            playerHead.position.y = 1.35; playerGroup.add(playerHead);
            const sword = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.3, 0.06), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00b4d8, emissiveIntensity: 1.5 }));
            sword.position.set(0.35, 0.9, 0.2); sword.rotation.x = Math.PI / 4; playerGroup.add(sword);

            function attackMonster(m, damageMultiplier = 1.0) {
                const isCrit = Math.random() < 0.35;
                const finalDmg = Math.round((state.atk * damageMultiplier) * (isCrit ? 1.85 : 1.0));
                m.hp -= finalDmg;
                showDamageText(m.mesh.position, finalDmg, isCrit);
                triggerHitStop(isCrit ? 60 : 30);
                addCombo();
                if (m.isBoss) document.getElementById('boss-bar-fill').style.width = `${Math.max(0, (m.hp / m.maxHp)) * 100}%`;
                if (m.hp <= 0) {
                    scene.remove(m.mesh);
                    const idx = monsters.indexOf(m);
                    if (idx > -1) monsters.splice(idx, 1);
                    state.gold += 2000;
                    setTimeout(nextStage, 1800);
                }
            }

            function nextStage() {
                state.stage++;
                if(state.stage > 7) state.stage = 1;
                const theme = STAGE_THEMES[state.stage];
                scene.background.setHex(theme.color);
                scene.fog.color.setHex(theme.color);
                scene.fog.density = theme.fog;
                
                buildEnvironmentObjects(state.stage);
                
                document.getElementById('ui-stage-name').innerText = theme.name;
                showToast(`STAGE CLEAR! -> ${theme.name}`);

                playerGroup.position.set(0,0,0);
                createBossForStage(state.stage);
            }

            function showToast(msg) {
                const toast = document.getElementById('toast-msg');
                toast.innerText = msg; toast.style.opacity = 1;
                setTimeout(() => toast.style.opacity = 0, 1800);
            }

            function updateUI() {
                document.getElementById('ui-gold').innerText = state.gold;
                document.getElementById('ui-level').innerText = `Lv.${state.level}`;
                document.getElementById('ui-hp-fill').style.width = `${Math.max(0, (state.hp / state.maxHp)) * 100}%`;
                document.getElementById('ui-mp-fill').style.width = `${(state.mp / state.maxMp) * 100}%`;
            }

            // 버튼 스킬 클릭 이벤트
            document.getElementById('btn-attack').onclick = () => {
                playSound('slash'); spawnSlashVFX(1.0, 0x00f0ff, 'slash');
                monsters.forEach(m => { if (playerGroup.position.distanceTo(m.mesh.position) < 5.5) attackMonster(m, 1.0); });
            };

            document.getElementById('btn-skill1').onclick = () => {
                if (state.mp >= 20 && cooldowns.skill1.current <= 0) {
                    state.mp -= 20; triggerCooldown('skill1'); playSound('slash'); spawnSlashVFX(1.6, 0x48cae4, 'dragon');
                    monsters.forEach(m => { if (playerGroup.position.distanceTo(m.mesh.position) < 8.5) attackMonster(m, 1.85); });
                    showToast("🐉 군구상빙륜환!"); updateUI();
                }
            };

            document.getElementById('btn-skill2').onclick = () => {
                if (state.mp >= 30 && cooldowns.skill2.current <= 0) {
                    state.mp -= 30; triggerCooldown('skill2'); playSound('slash'); spawnSlashVFX(2.2, 0x7209b7, 'meteor');
                    monsters.forEach(m => { if (playerGroup.position.distanceTo(m.mesh.position) < 11.0) attackMonster(m, 2.6); });
                    showToast("💫 빙류성(氷流星) 연타!"); updateUI();
                }
            };

            document.getElementById('btn-ult').onclick = () => {
                if (state.mp >= 40 && cooldowns.ult.current <= 0) {
                    state.mp -= 40; triggerCooldown('ult'); playSound('ult'); spawnSlashVFX(3.2, 0xf72585, 'ult');
                    monsters.forEach(m => { if (playerGroup.position.distanceTo(m.mesh.position) < 18.0) attackMonster(m, 5.0); });
                    showToast("❄️ 만해 [대홍련빙륜환] 각성!"); updateUI();
                }
            };

            document.getElementById('btn-dodge').onclick = () => {
                if (cooldowns.dodge.current <= 0) {
                    triggerCooldown('dodge');
                    playerGroup.position.x += -Math.sin(playerGroup.rotation.y) * 5.5;
                    playerGroup.position.z += -Math.cos(playerGroup.rotation.y) * 5.5;
                    showToast("⚡ 순보!");
                }
            };

            // 조이스틱 연동
            let moveVector = { x: 0, z: 0 };
            const joyArea = document.getElementById('joystick-area');
            const joyHandle = document.getElementById('joystick-handle');
            let isDragging = false, startX = 0, startY = 0;

            const onStart = (e) => { isDragging = true; const t = e.touches ? e.touches[0] : e; startX = t.clientX; startY = t.clientY; };
            const onMove = (e) => {
                if (!isDragging) return;
                const t = e.touches ? e.touches[0] : e;
                let dx = t.clientX - startX, dy = t.clientY - startY;
                const dist = Math.sqrt(dx*dx + dy*dy), maxR = 30;
                if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
                joyHandle.style.transform = `translate(${dx}px, ${dy}px)`;
                moveVector.x = dx / maxR; moveVector.z = dy / maxR;
            };
            const onEnd = () => { isDragging = false; joyHandle.style.transform = `translate(0,0)`; moveVector = { x: 0, z: 0 }; };

            joyArea.addEventListener('touchstart', onStart); window.addEventListener('touchmove', onMove); window.addEventListener('touchend', onEnd);
            joyArea.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);

            function animate() {
                requestAnimationFrame(animate);
                if (!state.isHitStopped) {
                    if (moveVector.x !== 0 || moveVector.z !== 0) {
                        playerGroup.position.x += moveVector.x * 0.16;
                        playerGroup.position.z += moveVector.z * 0.16;
                        playerGroup.rotation.y = Math.atan2(moveVector.x, moveVector.z);
                    }

                    for(let i = vfxList.length - 1; i >= 0; i--) {
                        const v = vfxList[i];
                        v.life -= 0.016;
                        if(v.type === 'fade') {
                            v.mesh.scale.addScalar(v.scaleSpeed);
                            v.mesh.children[0].material.opacity = v.life / v.maxLife;
                        }
                        if(v.life <= 0) { scene.remove(v.mesh); vfxList.splice(i, 1); }
                    }

                    monsters.forEach(m => {
                        m.mesh.rotation.y += 0.01;
                        m.mesh.position.y = Math.sin(Date.now() * 0.003) * 0.2;
                    });
                }

                cameraOffset.lerp(targetOffset, 0.08);
                camera.position.set(playerGroup.position.x + cameraOffset.x, playerGroup.position.y + cameraOffset.y, playerGroup.position.z + cameraOffset.z);
                camera.lookAt(playerGroup.position);
                composer.render();
            }

            updateUI();
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
</html>
