<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bleach: 7 Worlds Saga & Adjusted Scale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; }

        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        #top-hud { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; }
        .panel-box { background: rgba(2, 8, 20, 0.92); backdrop-filter: blur(16px); border: 1.5px solid #70e4ff; border-radius: 14px; padding: 12px; width: 320px; pointer-events: auto; box-shadow: 0 0 35px rgba(0, 240, 255, 0.45); }
        .gold-text { color: #ffd700; font-weight: bold; }
        .bar-container { width: 100%; height: 10px; background: rgba(255, 255, 255, 0.12); border-radius: 5px; overflow: hidden; margin-top: 6px; }
        .bar-fill-hp { width: 100%; height: 100%; background: linear-gradient(90deg, #ff416c, #ff4b2b); transition: width 0.2s; }
        .bar-fill-mp { width: 100%; height: 100%; background: linear-gradient(90deg, #00b4db, #0083b0); transition: width 0.2s; }
        .quest-box { margin-top: 8px; background: rgba(0, 240, 255, 0.15); border-left: 4px solid #70e4ff; padding: 6px 10px; font-size: 11px; font-weight: bold; line-height: 1.4; border-radius: 0 6px 6px 0; text-shadow: 0 0 8px #00f0ff; }

        #boss-hud { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 60%; max-width: 520px; text-align: center; display: none; }
        #boss-name { font-size: 16px; font-weight: 900; color: #ff3366; text-shadow: 0 0 12px #ff0055, 0 0 20px #ffffff; letter-spacing: 2px; margin-bottom: 4px; }
        .boss-bar-bg { width: 100%; height: 20px; background: rgba(0,0,0,0.85); border: 2px solid #ff3366; border-radius: 10px; overflow: hidden; box-shadow: 0 0 30px rgba(255, 0, 85, 0.7); }
        #boss-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff7700, #ffee00); transition: width 0.15s ease-out; }

        #combo-container { position: absolute; top: 25%; left: 35px; opacity: 0; transition: opacity 0.2s, transform 0.1s; transform: scale(1); pointer-events: none; }
        #combo-count { font-size: 52px; font-weight: 900; color: #70e4ff; text-shadow: 0 0 20px #00f0ff, 0 0 40px #ffaae5; font-style: italic; }
        #combo-text { font-size: 14px; font-weight: bold; color: #ffffff; letter-spacing: 2px; }

        #damage-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .damage-text { position: absolute; font-weight: 900; font-style: italic; transform: translate(-50%, -100%); animation: floatUp 0.8s ease-out forwards; text-shadow: 0 0 10px #000; }
        .damage-normal { font-size: 24px; color: #ffffff; text-shadow: 0 0 8px #00f0ff; }
        .damage-crit { font-size: 36px; color: #ffeb3b; text-shadow: 0 0 15px #ff5722, 0 0 25px #ffffff; }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
            30% { transform: translate(-50%, -100%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -180%) scale(1.0); }
        }

        #joystick-area { position: absolute; bottom: 35px; left: 30px; width: 110px; height: 110px; background: rgba(0, 240, 255, 0.08); border: 2px solid rgba(112, 228, 255, 0.5); border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(8px); box-shadow: 0 0 25px rgba(0, 240, 255, 0.3); }
        #joystick-handle { width: 45px; height: 45px; background: radial-gradient(circle, #ffffff, #70e4ff); border-radius: 50%; box-shadow: 0 0 25px #00f0ff; }

        /* UI 버튼 배치 (스킬 2 추가) */
        .action-area { position: absolute; bottom: 20px; right: 20px; width: 280px; height: 280px; pointer-events: none; }
        .btn-action { position: absolute; border-radius: 50%; color: #fff; font-weight: bold; display: flex; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; background: rgba(5, 12, 28, 0.9); border: 1.5px solid #70e4ff; box-shadow: 0 0 22px rgba(0, 240, 255, 0.5); font-size: 11px; text-shadow: 0 0 8px #00f0ff; overflow: hidden; }
        .btn-action:active { transform: scale(0.9); }
        
        .cooldown-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: 900; color: #00f0ff; opacity: 0; pointer-events: none; }

        #btn-attack { width: 85px; height: 85px; bottom: 0; right: 0; font-size: 16px; background: radial-gradient(circle, #ffffff, #0088ff); border-color: #ffffff; box-shadow: 0 0 32px #00f0ff; }
        #btn-dodge { width: 50px; height: 50px; bottom: 5px; right: 105px; }
        #btn-skill1 { width: 58px; height: 58px; bottom: 95px; right: 0; background: radial-gradient(circle, #f0f8ff, #00bfff); }
        #btn-skill2 { width: 58px; height: 58px; bottom: 100px; right: 75px; background: radial-gradient(circle, #ffffff, #00ffff); } /* 신규 스킬2 버튼 */
        #btn-ult { width: 70px; height: 70px; bottom: 165px; right: 15px; border-color: #ffffff; background: radial-gradient(circle, #ffffff, #e0aaff); box-shadow: 0 0 45px #ffffff; color: #10002b; font-size: 12px; }

        #toast-msg { position: absolute; top: 18%; width: 100%; text-align: center; color: #ffffff; font-size: 26px; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 20; text-shadow: 0 0 20px #00f0ff, 0 0 40px #ff70a6, 0 0 60px #ffffff; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="damage-container"></div>

    <div id="ui-layer">
        <div id="top-hud">
            <div class="panel-box">
                <div style="display:flex; justify-content:space-between;">
                    <span>❄️ 토시로 <b id="ui-level" style="color:#70e4ff;">Lv.1</b></span>
                    <span class="gold-text">💰 <b id="ui-gold">0</b></span>
                </div>
                <div class="bar-container"><div id="ui-hp-fill" class="bar-fill-hp"></div></div>
                <div class="bar-container"><div id="ui-mp-fill" class="bar-fill-mp"></div></div>
                <div class="quest-box">📖 <span id="ui-stage-name">1. 영혼의 마을 (튜토리얼)</span></div>
            </div>
        </div>

        <div id="boss-hud">
            <div id="boss-name">⚠️ BOSS: 호로화 빙룡 마신</div>
            <div class="boss-bar-bg"><div id="boss-bar-fill"></div></div>
        </div>

        <div id="combo-container">
            <div id="combo-count">0</div>
            <div id="combo-text">HITS!</div>
        </div>

        <div id="toast-msg">빙륜환(氷輪丸) 해방!</div>
        <div id="joystick-area"><div id="joystick-handle"></div></div>

        <div class="action-area">
            <div id="btn-dodge" class="btn-action">순보<div id="cd-dodge" class="cooldown-mask"></div></div>
            <div id="btn-skill1" class="btn-action">군구상<div id="cd-skill1" class="cooldown-mask"></div></div>
            <div id="btn-skill2" class="btn-action">빙류성<div id="cd-skill2" class="cooldown-mask"></div></div> <div id="btn-ult" class="btn-action">만해각성<div id="cd-ult" class="cooldown-mask"></div></div>
            <div id="btn-attack" class="btn-action">참격</div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const state = { stage: 1, gold: 0, level: 1, hp: 150, maxHp: 150, mp: 100, maxMp: 100, atk: 85, combo: 0, comboTimer: null, isHitStopped: false };

            const STAGE_THEMES = {
                1: { name: "1. 영혼의 마을 (튜토리얼)", color: 0xffa066, fog: 0.005, particles: 'sunset' },
                2: { name: "2. 영혼 수련 마을", color: 0xffd1dc, fog: 0.006, particles: 'cherry' },
                3: { name: "3. 영혼 기사단 본부", color: 0xd8e8f8, fog: 0.004, particles: 'snow' },
                4: { name: "4. 하얀 사막 차원", color: 0x222233, fog: 0.003, particles: 'sand' },
                5: { name: "5. 수정 궁전", color: 0x003366, fog: 0.003, particles: 'crystal' },
                6: { name: "6. 최종 결전 도시", color: 0x550000, fog: 0.007, particles: 'fire' },
                7: { name: "7. 엔딩 마을", color: 0xe0ffff, fog: 0.004, particles: 'cherry' }
            };

            const cooldowns = {
                dodge: { max: 2, current: 0, el: document.getElementById('cd-dodge') },
                skill1: { max: 4, current: 0, el: document.getElementById('cd-skill1') },
                skill2: { max: 6, current: 0, el: document.getElementById('cd-skill2') }, // 스킬2 쿨타임
                ult: { max: 12, current: 0, el: document.getElementById('cd-ult') }
            };

            function triggerCooldown(key) {
                const cd = cooldowns[key];
                cd.current = cd.max;
                cd.el.style.opacity = '1';
                cd.el.innerText = cd.current;

                const timer = setInterval(() => {
                    cd.current -= 1;
                    if (cd.current <= 0) { clearInterval(timer); cd.el.style.opacity = '0'; } 
                    else { cd.el.innerText = cd.current; }
                }, 1000);
            }

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            function playSound(type) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                if (type === 'slash') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(900, now); osc.frequency.exponentialRampToValueAtTime(150, now + 0.15);
                    gain.gain.setValueAtTime(0.35, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                } else if (type === 'ult') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.75);
                    gain.gain.setValueAtTime(0.65, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.75);
                    osc.start(now); osc.stop(now + 0.75);
                }
            }

            function triggerHitStop(duration = 50) {
                state.isHitStopped = true;
                setTimeout(() => { state.isHitStopped = false; }, duration);
            }

            function showDamageText(pos, dmgAmount, isCrit = false) {
                const vector = pos.clone(); vector.y += 2.5; vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;

                const dmgEl = document.createElement('div');
                dmgEl.className = `damage-text ${isCrit ? 'damage-crit' : 'damage-normal'}`;
                dmgEl.innerText = isCrit ? `CRITICAL! ${dmgAmount}` : dmgAmount;
                dmgEl.style.left = `${x}px`; dmgEl.style.top = `${y}px`;

                document.getElementById('damage-container').appendChild(dmgEl);
                setTimeout(() => dmgEl.remove(), 800);
            }

            function addCombo() {
                state.combo++;
                const comboEl = document.getElementById('combo-container');
                document.getElementById('combo-count').innerText = state.combo;
                comboEl.style.opacity = '1';
                comboEl.style.transform = 'scale(1.25)';
                setTimeout(() => comboEl.style.transform = 'scale(1)', 100);

                clearTimeout(state.comboTimer);
                state.comboTimer = setTimeout(() => { comboEl.style.opacity = '0'; state.combo = 0; }, 2000);
            }

            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(STAGE_THEMES[1].color);
            scene.fog = new THREE.FogExp2(STAGE_THEMES[1].color, STAGE_THEMES[1].fog);

            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            let targetOffset = new THREE.Vector3(0, 11, 14);
            let cameraOffset = targetOffset.clone();

            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            const composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.3, 0.45, 0.15);
            composer.addPass(bloomPass);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.8);
            mainLight.position.set(30, 50, 20);
            mainLight.castShadow = true;
            scene.add(mainLight);

            // 호로 가면 Canvas 텍스처
            function createHollowMaskTexture() {
                const cv = document.createElement('canvas');
                cv.width = 512; cv.height = 512;
                const ctx = cv.getContext('2d');
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 512, 512);
                ctx.fillStyle = '#cc0022';
                for(let i=0; i<4; i++) { ctx.fillRect(160 + i*50, 40, 25, 430); }
                ctx.fillStyle = '#000000';
                ctx.beginPath(); ctx.ellipse(170, 240, 50, 35, -0.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(342, 240, 50, 35, 0.2, 0, Math.PI * 2); ctx.fill();
                return new THREE.CanvasTexture(cv);
            }

            // 바닥 지형
            const floorMat = new THREE.MeshPhysicalMaterial({ color: 0x111622, roughness: 0.3, metalness: 0.1 });
            const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(160, 160), floorMat);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.receiveShadow = true;
            scene.add(floorMesh);

            // 배경 환경 오브젝트 그룹
            let envGroup = new THREE.Group();
            scene.add(envGroup);

            function buildEnvironmentObjects(stage) {
                while(envGroup.children.length > 0) { envGroup.remove(envGroup.children[0]); }

                if (stage === 1) { // 영혼의 마을 (가로등)
                    floorMat.color.setHex(0x3a2e2b);
                    for(let i=0; i<12; i++) {
                        const lamp = new THREE.Group();
                        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 5), new THREE.MeshStandardMaterial({color: 0x222222}));
                        pole.position.y = 2.5; lamp.add(pole);
                        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({color: 0xffaa33}));
                        bulb.position.y = 5.0; lamp.add(bulb);
                        lamp.position.set((i%2 === 0 ? -18 : 18), 0, -60 + i*10);
                        envGroup.add(lamp);
                    }
                } else if (stage === 2) { // 영혼 수련 마을 (석등)
                    floorMat.color.setHex(0x2d3b2d);
                    for(let i=0; i<10; i++) {
                        const lantern = new THREE.Mesh(new THREE.BoxGeometry(1.2, 3.0, 1.2), new THREE.MeshStandardMaterial({color: 0x777777}));
                        lantern.position.set((i%2 === 0 ? -16 : 16), 1.5, -50 + i*12);
                        envGroup.add(lantern);
                    }
                } else if (stage === 3) { // 영혼 기사단 본부 (거대 흰 성벽)
                    floorMat.color.setHex(0xaaaaaa);
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(120, 20, 4), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
                    wall.position.set(0, 10, -45); envGroup.add(wall);
                } else if (stage === 4) { // 하얀 사막 차원 (끝없는 흰 모래 & 거대한 달)
                    floorMat.color.setHex(0xe8e8e8);
                    const moon = new THREE.Mesh(new THREE.SphereGeometry(14, 32, 32), new THREE.MeshBasicMaterial({color: 0xffffff}));
                    moon.position.set(0, 25, -70); envGroup.add(moon);
                    for(let i=0; i<8; i++) {
                        const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(3.0), new THREE.MeshStandardMaterial({color: 0x111111}));
                        rock.position.set((Math.random()-0.5)*60, 1.5, (Math.random()-0.5)*60); envGroup.add(rock);
                    }
                } else if (stage === 5) { // 수정 궁전 (푸른 수정 기둥)
                    floorMat.color.setHex(0x00ffff); floorMat.roughness = 0.05;
                    for(let i=0; i<8; i++) {
                        const crystal = new THREE.Mesh(new THREE.OctahedronGeometry(2.5, 0), new THREE.MeshStandardMaterial({color: 0x00f0ff, emissive: 0x0088ff, emissiveIntensity: 1.5}));
                        crystal.scale.set(1, 4, 1);
                        crystal.position.set((i%2 === 0 ? -20 : 20), 5, -40 + i*12); envGroup.add(crystal);
                    }
                } else if (stage === 6) { // 최종 결전 도시 (무너진 건물 잔해)
                    floorMat.color.setHex(0x1a0505);
                    for(let i=0; i<7; i++) {
                        const ruin = new THREE.Mesh(new THREE.BoxGeometry(8, 15 + Math.random()*15, 8), new THREE.MeshStandardMaterial({color: 0x221111}));
                        ruin.rotation.z = (Math.random() - 0.5) * 0.3;
                        ruin.position.set((i%2 === 0 ? -25 : 25), 6, -50 + i*15); envGroup.add(ruin);
                    }
                } else if (stage === 7) { // 엔딩 마을 (다리와 강 연출)
                    floorMat.color.setHex(0x354a21);
                    const river = new THREE.Mesh(new THREE.PlaneGeometry(160, 12), new THREE.MeshBasicMaterial({color: 0x00aaff}));
                    river.rotation.x = -Math.PI / 2; river.position.set(0, 0.05, -10); envGroup.add(river);
                    const bridge = new THREE.Mesh(new THREE.BoxGeometry(8, 0.4, 14), new THREE.MeshStandardMaterial({color: 0x8b4513}));
                    bridge.position.set(0, 0.2, -10); envGroup.add(bridge);
                }
            }

            buildEnvironmentObjects(1);

            // 파티클
            let particleSystem;
            function createParticles(stage) {
                if(particleSystem) scene.remove(particleSystem);
                const theme = STAGE_THEMES[stage];
                const count = 1200;
                const geo = new THREE.BufferGeometry();
                const pos = new Float32Array(count * 3);
                for (let i = 0; i < count * 3; i += 3) {
                    pos[i] = (Math.random() - 0.5) * 150; pos[i+1] = Math.random() * 50; pos[i+2] = (Math.random() - 0.5) * 150;
                }
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                let color = 0xffffff;
                if(theme.particles === 'cherry') color = 0xffb7c5;
                else if(theme.particles === 'sunset') color = 0xffaa44;
                else if(theme.particles === 'fire') color = 0xff3300;

                particleSystem = new THREE.Points(geo, new THREE.PointsMaterial({ color: color, size: 0.8, transparent: true, opacity: 0.8 }));
                scene.add(particleSystem);
            }
            createParticles(1);

            // 플레이어 모델
            const playerGroup = new THREE.Group();
            scene.add(playerGroup);
            const playerBody = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x080c14 }));
            playerBody.position.y = 0.6; playerGroup.add(playerBody);
            const playerHead = new THREE.Mesh(new THREE.SphereGeometry(0.28), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            playerHead.position.y = 1.35; playerGroup.add(playerHead);
            const sword = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.2, 0.06), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00f0ff, emissiveIntensity: 2.0 }));
            sword.position.set(0.35, 0.9, 0.2); sword.rotation.x = Math.PI / 4; playerGroup.add(sword);

            const monsters = [];
            const maskTex = createHollowMaskTexture();

            // 적당한 크기로 조정된 호로 보스 생성 함수 (기존 대비 약 50% 축소)
            function createAdjustedHollowBoss() {
                const group = new THREE.Group();

                // 호로 가면 머리 (크기 축소: 반경 0.7)
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.7, 24, 24), new THREE.MeshStandardMaterial({ map: maskTex, roughness: 0.2 }));
                head.position.y = 2.1; head.rotation.y = Math.PI; group.add(head);

                // 붉은 안광
                const eyeLight = new THREE.PointLight(0xff0033, 2.5, 6);
                eyeLight.position.set(0, 2.1, 0.6); group.add(eyeLight);

                // 악마 뿔
                for(let side = -1; side <= 1; side += 2) {
                    const horn = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.9, 6), new THREE.MeshStandardMaterial({ color: 0x111111, emissive: 0xff0033 }));
                    horn.position.set(side * 0.4, 2.7, 0); horn.rotation.z = -side * 0.4; group.add(horn);
                }

                // 신체 (높이 1.6)
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 1.6, 8), new THREE.MeshStandardMaterial({ color: 0x0a030d, emissive: 0x330011 }));
                body.position.y = 0.8; group.add(body);

                group.position.set(0, 0, -18); scene.add(group);
                monsters.push({ mesh: group, hp: 2500, maxHp: 2500, isBoss: true });
                document.getElementById('boss-hud').style.display = 'block';
            }

            createAdjustedHollowBoss();

            const vfxList = [];
            function spawnSlashVFX(scale = 1.0, color = 0x00f0ff) {
                const group = new THREE.Group();
                const arcGeo = new THREE.RingGeometry(1.0 * scale, 2.5 * scale, 32, 1, 0, Math.PI * 0.75);
                const arcMat = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending });
                const arcMesh = new THREE.Mesh(arcGeo, arcMat);
                group.add(arcMesh);
                group.position.copy(playerGroup.position);
                group.position.y += 0.8;
                group.rotation.x = Math.PI / 2;
                group.rotation.z = playerGroup.rotation.y + Math.PI / 4;
                scene.add(group);
                vfxList.push({ mesh: group, type: 'fade', life: 0.2, maxLife: 0.2, scaleSpeed: 0.18 });
            }

            function attackMonster(m, damageMultiplier = 1.0) {
                const isCrit = Math.random() < 0.35;
                const finalDmg = Math.round((state.atk * damageMultiplier) * (isCrit ? 1.85 : 1.0));
                m.hp -= finalDmg;
                showDamageText(m.mesh.position, finalDmg, isCrit);
                triggerHitStop(isCrit ? 70 : 35);
                addCombo();
                if (m.isBoss) document.getElementById('boss-bar-fill').style.width = `${Math.max(0, (m.hp / m.maxHp)) * 100}%`;
                if (m.hp <= 0) {
                    scene.remove(m.mesh);
                    const idx = monsters.indexOf(m);
                    if (idx > -1) monsters.splice(idx, 1);
                    state.gold += 1500;
                    setTimeout(nextStage, 1800);
                }
            }

            function nextStage() {
                state.stage++;
                if(state.stage > 7) state.stage = 1;
                const theme = STAGE_THEMES[state.stage];
                scene.background.setHex(theme.color);
                scene.fog.color.setHex(theme.color);
                scene.fog.density = theme.fog;
                
                buildEnvironmentObjects(state.stage);
                createParticles(state.stage);
                
                document.getElementById('ui-stage-name').innerText = theme.name;
                showToast(`STAGE CLEAR! -> ${theme.name}`);

                playerGroup.position.set(0,0,0);
                createAdjustedHollowBoss();
            }

            function showToast(msg) {
                const toast = document.getElementById('toast-msg');
                toast.innerText = msg; toast.style.opacity = 1;
                setTimeout(() => toast.style.opacity = 0, 1800);
            }

            function updateUI() {
                document.getElementById('ui-gold').innerText = state.gold;
                document.getElementById('ui-level').innerText = `Lv.${state.level}`;
                document.getElementById('ui-hp-fill').style.width = `${Math.max(0, (state.hp / state.maxHp)) * 100}%`;
                document.getElementById('ui-mp-fill').style.width = `${(state.mp / state.maxMp) * 100}%`;
            }

            // 스킬 이벤트 연결
            document.getElementById('btn-attack').onclick = () => {
                playSound('slash'); spawnSlashVFX(1.0, 0x00f0ff);
                monsters.forEach(m => { if (playerGroup.position.distanceTo(m.mesh.position) < 5.5) attackMonster(m, 1.0); });
            };

            document.getElementById('btn-skill1').onclick = () => {
                if (state.mp >= 20 && cooldowns.skill1.current <= 0) {
                    state.mp -= 20; triggerCooldown('skill1'); playSound('slash'); spawnSlashVFX(1.6, 0x00aaff);
                    monsters.forEach(m => { if (playerGroup.position.distanceTo(m.mesh.position) < 8.5) attackMonster(m, 1.85); });
                    showToast("🐉 군구상빙륜환!"); updateUI();
                }
            };

            // 신규 추가된 [스킬 2: 빙류성]
            document.getElementById('btn-skill2').onclick = () => {
                if (state.mp >= 30 && cooldowns.skill2.current <= 0) {
                    state.mp -= 30; triggerCooldown('skill2'); playSound('slash'); spawnSlashVFX(2.2, 0xff00ff);
                    monsters.forEach(m => { if (playerGroup.position.distanceTo(m.mesh.position) < 11.0) attackMonster(m, 2.6); });
                    showToast("💫 빙류성(氷流星) 연타!"); updateUI();
                }
            };

            document.getElementById('btn-ult').onclick = () => {
                if (state.mp >= 40 && cooldowns.ult.current <= 0) {
                    state.mp -= 40; triggerCooldown('ult'); playSound('ult'); spawnSlashVFX(3.0, 0xffffff);
                    monsters.forEach(m => { if (playerGroup.position.distanceTo(m.mesh.position) < 18.0) attackMonster(m, 5.0); });
                    showToast("❄️ 만해 [대홍련빙륜환] 각성!"); updateUI();
                }
            };

            document.getElementById('btn-dodge').onclick = () => {
                if (cooldowns.dodge.current <= 0) {
                    triggerCooldown('dodge');
                    playerGroup.position.x += -Math.sin(playerGroup.rotation.y) * 5.0;
                    playerGroup.position.z += -Math.cos(playerGroup.rotation.y) * 5.0;
                    showToast("⚡ 순보!");
                }
            };

            // 조이스틱
            let moveVector = { x: 0, z: 0 };
            const joyArea = document.getElementById('joystick-area');
            const joyHandle = document.getElementById('joystick-handle');
            let isDragging = false, startX = 0, startY = 0;

            const onStart = (e) => { isDragging = true; const t = e.touches ? e.touches[0] : e; startX = t.clientX; startY = t.clientY; };
            const onMove = (e) => {
                if (!isDragging) return;
                const t = e.touches ? e.touches[0] : e;
                let dx = t.clientX - startX, dy = t.clientY - startY;
                const dist = Math.sqrt(dx*dx + dy*dy), maxR = 30;
                if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
                joyHandle.style.transform = `translate(${dx}px, ${dy}px)`;
                moveVector.x = dx / maxR; moveVector.z = dy / maxR;
            };
            const onEnd = () => { isDragging = false; joyHandle.style.transform = `translate(0,0)`; moveVector = { x: 0, z: 0 }; };

            joyArea.addEventListener('touchstart', onStart); window.addEventListener('touchmove', onMove); window.addEventListener('touchend', onEnd);
            joyArea.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);

            function animate() {
                requestAnimationFrame(animate);
                if (!state.isHitStopped) {
                    if (moveVector.x !== 0 || moveVector.z !== 0) {
                        playerGroup.position.x += moveVector.x * 0.16;
                        playerGroup.position.z += moveVector.z * 0.16;
                        playerGroup.rotation.y = Math.atan2(moveVector.x, moveVector.z);
                    }

                    if(particleSystem) {
                        const pos = particleSystem.geometry.attributes.position.array;
                        for (let i = 1; i < pos.length; i += 3) {
                            pos[i] -= 0.1; if (pos[i] < 0) pos[i] = 50;
                        }
                        particleSystem.geometry.attributes.position.needsUpdate = true;
                    }

                    for(let i = vfxList.length - 1; i >= 0; i--) {
                        const v = vfxList[i];
                        v.life -= 0.016;
                        if(v.type === 'fade') {
                            v.mesh.scale.addScalar(v.scaleSpeed);
                            v.mesh.children[0].material.opacity = v.life / v.maxLife;
                        }
                        if(v.life <= 0) { scene.remove(v.mesh); vfxList.splice(i, 1); }
                    }

                    monsters.forEach(m => {
                        m.mesh.rotation.y += 0.01;
                        m.mesh.position.y = Math.sin(Date.now() * 0.003) * 0.3;
                    });
                }

                cameraOffset.lerp(targetOffset, 0.08);
                camera.position.set(playerGroup.position.x + cameraOffset.x, playerGroup.position.y + cameraOffset.y, playerGroup.position.z + cameraOffset.z);
                camera.lookAt(playerGroup.position);
                composer.render();
            }

            updateUI();
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
</html>
