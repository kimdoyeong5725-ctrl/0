<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Bleach Story RPG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #0b1325; font-family: 'Segoe UI', sans-serif; color: #fff; }

        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* TOP HUD */
        #top-hud { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; }
        .panel-box { background: rgba(10, 25, 45, 0.9); border: 1.5px solid #87ceeb; border-radius: 8px; padding: 10px; width: 220px; pointer-events: auto; box-shadow: 0 0 15px rgba(135, 206, 235, 0.5); }
        .gold-text { color: #ffd700; }
        .bar-container { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.2); border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .bar-fill-hp { width: 100%; height: 100%; background: linear-gradient(90deg, #00ff88, #00b894); transition: width 0.15s; }
        .bar-fill-mp { width: 100%; height: 100%; background: linear-gradient(90deg, #00dfff, #74b9ff); transition: width 0.15s; }
        .quest-box { margin-top: 8px; background: rgba(0, 223, 255, 0.15); border-left: 3px solid #00dfff; padding: 6px; font-size: 11px; font-weight: bold; }

        .top-right-btns { display: flex; flex-direction: column; gap: 6px; }
        .btn-hud { background: rgba(10, 25, 45, 0.9); border: 1.5px solid #87ceeb; color: #fff; padding: 7px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; pointer-events: auto; cursor: pointer; text-shadow: 0 0 4px #87ceeb; }
        .btn-hud:active { transform: scale(0.95); }

        .btn-glb-highlight {
            border-color: #00ff88 !important;
            color: #00ff88 !important;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.7) !important;
        }

        /* JOYSTICK & BUTTONS */
        #joystick-area { position: absolute; bottom: 35px; left: 30px; width: 110px; height: 110px; background: rgba(135, 206, 235, 0.15); border: 2px solid rgba(135, 206, 235, 0.7); border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #joystick-handle { width: 45px; height: 45px; background: radial-gradient(circle, #e0f7fa, #00dfff); border-radius: 50%; box-shadow: 0 0 15px #00dfff; }

        .action-area { position: absolute; bottom: 20px; right: 20px; width: 220px; height: 220px; pointer-events: none; }
        .btn-action { position: absolute; border-radius: 50%; color: #fff; font-weight: bold; display: flex; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; background: rgba(10, 25, 45, 0.9); border: 1.5px solid #87ceeb; box-shadow: 0 0 12px rgba(135, 206, 235, 0.6); font-size: 11px; }
        .btn-action:active { transform: scale(0.9); }
        #btn-attack { width: 80px; height: 80px; bottom: 0; right: 0; font-size: 15px; background: radial-gradient(circle, #87ceeb, #0099ff); border-color: #e0f7fa; box-shadow: 0 0 18px #87ceeb; }
        #btn-dodge { width: 50px; height: 50px; bottom: 0; right: 100px; }
        #btn-skill { width: 55px; height: 55px; bottom: 100px; right: 0; background: radial-gradient(circle, #a0e6ff, #00bfff); border-color: #e0f7fa; box-shadow: 0 0 15px #a0e6ff; font-size: 10px; text-align: center; }
        #btn-ult { width: 70px; height: 70px; bottom: 80px; right: 80px; border-color: #ffffff; background: radial-gradient(circle, #e0f7fa, #00dfff); box-shadow: 0 0 25px #ffffff; color: #003366; font-size: 12px; }

        /* MODALS */
        .modal-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 290px; background: rgba(10, 25, 45, 0.98); border: 2px solid #87ceeb; border-radius: 12px; padding: 15px; display: none; flex-direction: column; gap: 10px; pointer-events: auto; z-index: 100; box-shadow: 0 0 25px rgba(135, 206, 235, 0.6); }
        .modal-header { font-size: 14px; font-weight: bold; color: #87ceeb; text-align: center; border-bottom: 1px solid rgba(135, 206, 235, 0.3); padding-bottom: 6px; }
        .modal-body { font-size: 11px; display: flex; flex-direction: column; gap: 8px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.08); padding: 6px; border-radius: 4px; }
        .stat-btn { background: #0077b6; border: 1px solid #87ceeb; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        #toast-msg { position: absolute; top: 25%; width: 100%; text-align: center; color: #a0e6ff; font-size: 22px; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.4s; z-index: 20; text-shadow: 0 0 15px #00dfff; }

        #height-slider-box { display: flex; flex-direction: column; gap: 6px; align-items: center; margin-top: 5px; }
        #height-slider-box input { width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <input type="file" id="glb-file-input" accept=".glb, .gltf" style="display: none;">

    <div id="ui-layer">
        <div id="top-hud">
            <div class="panel-box">
                <div style="display:flex; justify-content:space-between;">
                    <span>⚔️ 사신 <b id="ui-level" style="color:#87ceeb;">Lv.1</b></span>
                    <span class="gold-text">💰 <b id="ui-gold">0</b></span>
                </div>
                <div class="bar-container"><div id="ui-hp-fill" class="bar-fill-hp"></div></div>
                <div class="bar-container"><div id="ui-mp-fill" class="bar-fill-mp"></div></div>
                <div class="quest-box">📖 <span id="ui-stage">1장: 현세 호로 퇴치 (0/3)</span></div>
            </div>
            
            <div class="top-right-btns">
                <button class="btn-hud" id="btn-open-stat">⚔️ 스탯</button>
                <button class="btn-hud" id="btn-open-inv">🎒 참백도</button>
                <button class="btn-hud" id="btn-open-shop">🏪 상점</button>
                <button class="btn-hud btn-glb-highlight" id="btn-upload-glb">📦 .GLB 모델 적용</button>
                <button class="btn-hud" id="btn-open-height" style="border-color:#a0e6ff; color:#a0e6ff;">📏 높이 조절</button>
            </div>
        </div>

        <div id="toast-msg">블리치 스토리 시작!</div>

        <div id="joystick-area"><div id="joystick-handle"></div></div>

        <div class="action-area">
            <div id="btn-dodge" class="btn-action">순보</div>
            <div id="btn-skill" class="btn-action">얼음송이</div>
            <div id="btn-ult" class="btn-action">만해각성</div>
            <div id="btn-attack" class="btn-action">공격</div>
        </div>

        <div id="modal-stat" class="modal-overlay">
            <div class="modal-header">❄️ 사신 능력치</div>
            <div class="modal-body">
                <div class="stat-row"><span>영력(공격력)</span><b id="stat-atk">25</b></div>
                <div class="stat-row"><span>방어력</span><b id="stat-def">5</b></div>
            </div>
            <button class="btn-hud" id="btn-close-stat">닫기</button>
        </div>

        <div id="modal-inv" class="modal-overlay">
            <div class="modal-header">🎒 인벤토리</div>
            <div class="modal-body">
                <div class="stat-row"><span>🗡️ 빙륜환 (氷輪丸)</span><span style="color:#00ff88;">+15 영력</span></div>
            </div>
            <button class="btn-hud" id="btn-close-inv">닫기</button>
        </div>

        <div id="modal-shop" class="modal-overlay">
            <div class="modal-header">🏪 영압 강화</div>
            <div class="modal-body">
                <div class="stat-row">
                    <div>영력 +5<br><small class="gold-text">100 Gold</small></div>
                    <button class="stat-btn" id="buy-atk">강화</button>
                </div>
            </div>
            <button class="btn-hud" id="btn-close-shop">닫기</button>
        </div>

        <div id="modal-height" class="modal-overlay">
            <div class="modal-header">📏 캐릭터 높이 조절</div>
            <div class="modal-body">
                <div id="height-slider-box">
                    <span>높이: <b id="height-val" style="color:#87ceeb;">0.0</b></span>
                    <input type="range" id="height-slider" min="-3" max="5" step="0.1" value="0">
                </div>
            </div>
            <button class="btn-hud" id="btn-close-height">완료</button>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const state = { gold: 0, level: 1, hp: 100, maxHp: 100, mp: 50, maxMp: 50, atk: 25, isAwakened: false, stage: 1, killCount: 0 };

            const stagesInfo = [
                { id: 1, name: "1장: 현세 호로 퇴치", target: 3, enemyName: "호로", color: 0xffffff },
                { id: 2, name: "2장: 메노스 그랑데 출현", target: 2, enemyName: "메노스", color: 0x111111 },
                { id: 3, name: "3장: 웨코문드 에스파다 결전", target: 3, enemyName: "에스파다", color: 0xe0e0e0 },
                { id: 4, name: "4장: 결전! 아이젠 소스케", target: 1, enemyName: "아이젠", color: 0x8e44ad },
                { id: 5, name: "5장: 반덴라이히 퀸시 침공", target: 4, enemyName: "퀸시", color: 0x00dfff },
                { id: 6, name: "최종장: 모든 위협 평정 완료!", target: 999, enemyName: "잔당", color: 0xffffff }
            ];

            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();

            scene.background = new THREE.Color(0x22313f);
            scene.fog = new THREE.FogExp2(0x22313f, 0.012);

            const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xe0f7fa, 2.0));

            const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
            mainLight.position.set(20, 45, 20);
            mainLight.castShadow = true;
            scene.add(mainLight);

            const grid = new THREE.GridHelper(100, 50, 0x00dfff, 0x34495e);
            grid.position.y = 0.01;
            scene.add(grid);

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.3 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // PLAYER GROUP
            const playerGroup = new THREE.Group();
            scene.add(playerGroup);

            const characterContainer = new THREE.Group();
            playerGroup.add(characterContainer);

            let defaultMesh = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.6, 1.6, 16),
                new THREE.MeshStandardMaterial({ color: 0x00dfff, emissive: 0x005588 })
            );
            defaultMesh.position.y = 0.8;
            defaultMesh.castShadow = true;
            characterContainer.add(defaultMesh);

            // 🪽 얼음 날개 (만해 각성용)
            let iceWingsGroup = new THREE.Group();
            function createIceWings() {
                iceWingsGroup.clear();
                const wingMat = new THREE.MeshStandardMaterial({ color: 0xe0f7fa, emissive: 0x00dfff, emissiveIntensity: 0.8, transparent: true, opacity: 0.85 });
                for(let side of [-1, 1]) {
                    for(let i=0; i<4; i++) {
                        const feather = new THREE.Mesh(new THREE.ConeGeometry(0.2, 1.8 - i*0.2, 4), wingMat);
                        feather.rotation.z = side * (Math.PI / 3 + i * 0.15);
                        feather.rotation.x = 0.2;
                        feather.position.set(side * (0.4 + i*0.25), 1.2 + i*0.1, -0.3);
                        iceWingsGroup.add(feather);
                    }
                }
                characterContainer.add(iceWingsGroup);
            }

            // 📦 GLB 로더 및 높이 조절
            const glbInput = document.getElementById('glb-file-input');
            const btnGlb = document.getElementById('btn-upload-glb');
            const heightSlider = document.getElementById('height-slider');
            const heightVal = document.getElementById('height-val');

            btnGlb.onclick = () => glbInput.click();

            heightSlider.addEventListener('input', (e) => {
                const yOffset = parseFloat(e.target.value);
                characterContainer.position.y = yOffset;
                heightVal.innerText = yOffset.toFixed(1);
            });

            glbInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                showToast("3D 모델 로딩 중...");
                const url = URL.createObjectURL(file);
                const loader = new THREE.GLTFLoader();

                loader.load(url, (gltf) => {
                    while(characterContainer.children.length > 0) characterContainer.remove(characterContainer.children[0]);
                    const loadedModel = gltf.scene;

                    const box = new THREE.Box3().setFromObject(loadedModel);
                    const size = box.getSize(new THREE.Vector3());
                    const scale = 2.0 / (Math.max(size.x, size.y, size.z) || 1);
                    loadedModel.scale.set(scale, scale, scale);

                    const newBox = new THREE.Box3().setFromObject(loadedModel);
                    const autoY = -newBox.min.y;
                    characterContainer.position.y = autoY;
                    heightSlider.value = autoY;
                    heightVal.innerText = autoY.toFixed(1);

                    loadedModel.traverse((child) => { if (child.isMesh) child.castShadow = true; });
                    characterContainer.add(loadedModel);
                    if (state.isAwakened) createIceWings();
                    showToast("🎉 사신 모델 적용 완료!");
                });
            });

            // 👹 블리치 세력별 도형 몬스터 생성기
            const monsters = [];
            
            function createEnemyShape(stageId) {
                const enemyGroup = new THREE.Group();
                let mesh, size = 1.2;

                if (stageId === 1) { // 1. 호로 (하얀 상자 + 검은 구멍)
                    mesh = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2, 1.4, 1.2),
                        new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.2 })
                    );
                    const hole = new THREE.Mesh(
                        new THREE.SphereGeometry(0.35, 8, 8),
                        new THREE.MeshBasicMaterial({ color: 0x000000 })
                    );
                    hole.position.set(0, 0.2, 0.5);
                    enemyGroup.add(mesh, hole);
                    enemyGroup.position.y = 0.7;

                } else if (stageId === 2) { // 2. 메노스 그랑데 (거대한 검은 기둥)
                    mesh = new THREE.Mesh(
                        new THREE.CylinderGeometry(1.5, 2.2, 8.0, 12),
                        new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 })
                    );
                    const redEyes = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2, 0.2, 0.2),
                        new THREE.MeshBasicMaterial({ color: 0xff0000 })
                    );
                    redEyes.position.set(0, 3.0, 1.5);
                    enemyGroup.add(mesh, redEyes);
                    enemyGroup.position.y = 4.0;
                    size = 2.5;

                } else if (stageId === 3) { // 3. 에스파다 (날렵한 은백색 원뿔)
                    mesh = new THREE.Mesh(
                        new THREE.ConeGeometry(0.8, 2.2, 6),
                        new THREE.MeshStandardMaterial({ color: 0xe0e0e0, metalness: 0.5, roughness: 0.2 })
                    );
                    mesh.rotation.x = Math.PI;
                    enemyGroup.add(mesh);
                    enemyGroup.position.y = 1.1;

                } else if (stageId === 4) { // 4. 아이젠 소스케 (보라색 팔면체 최종 보스)
                    mesh = new THREE.Mesh(
                        new THREE.OctahedronGeometry(2.0, 0),
                        new THREE.MeshStandardMaterial({ color: 0x8e44ad, emissive: 0x341f97, emissiveIntensity: 0.8 })
                    );
                    enemyGroup.add(mesh);
                    enemyGroup.position.y = 2.2;
                    size = 2.0;

                } else { // 5. 퀸시 (하늘색 다이아몬드/십자가 형태)
                    mesh = new THREE.Mesh(
                        new THREE.OctahedronGeometry(1.2, 0),
                        new THREE.MeshStandardMaterial({ color: 0x00dfff, emissive: 0x00a8ff, emissiveIntensity: 0.6 })
                    );
                    mesh.scale.set(0.6, 1.8, 0.6);
                    enemyGroup.add(mesh);
                    enemyGroup.position.y = 1.2;
                }

                enemyGroup.userData = { hitSize: size };
                return enemyGroup;
            }

            function spawnMonster() {
                if (monsters.length < (state.stage === 4 ? 1 : 3)) {
                    const m = createEnemyShape(state.stage);
                    const angle = Math.random() * Math.PI * 2;
                    const dist = state.stage === 2 ? 12 : 9;
                    m.position.set(playerGroup.position.x + Math.cos(angle) * dist, m.position.y, playerGroup.position.z + Math.sin(angle) * dist);
                    scene.add(m);
                    monsters.push(m);
                }
            }

            // ❄️ 스킬 및 파티클 시스템
            const particles = [];
            const iceProjectiles = [];

            function createIceParticle(pos, size = 0.5, speed = 0.4) {
                const mat = new THREE.MeshBasicMaterial({ color: 0x87ceeb, transparent: true, opacity: 1.0 });
                const p = new THREE.Mesh(new THREE.IcosahedronGeometry(size, 0), mat);
                p.position.copy(pos);
                p.position.x += (Math.random() - 0.5) * 2.0;
                p.position.y += Math.random() * 1.8;
                p.position.z += (Math.random() - 0.5) * 2.0;

                p.userData = {
                    velocity: new THREE.Vector3((Math.random() - 0.5) * speed, Math.random() * speed * 1.2, (Math.random() - 0.5) * speed),
                    life: 1.0
                };
                scene.add(p);
                particles.push(p);
            }

            function launchIceOrb() {
                const orbGroup = new THREE.Group();
                const core = new THREE.Mesh(
                    new THREE.IcosahedronGeometry(0.7, 1),
                    new THREE.MeshStandardMaterial({ color: 0xe0f7fa, emissive: 0x00dfff, emissiveIntensity: 0.9 })
                );
                orbGroup.add(core);
                orbGroup.position.copy(playerGroup.position);
                orbGroup.position.y += 1.0;

                const angle = playerGroup.rotation.y;
                orbGroup.userData = { dir: new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle)).normalize(), speed: 0.45, life: 100 };
                scene.add(orbGroup);
                iceProjectiles.push(orbGroup);
            }

            function createSnowMountain(pos) {
                const mtnGroup = new THREE.Group();
                mtnGroup.position.copy(pos);

                const mtn = new THREE.Mesh(new THREE.ConeGeometry(5.0, 7.0, 8), new THREE.MeshStandardMaterial({ color: 0x87ceeb }));
                mtn.position.y = 3.5;
                mtnGroup.add(mtn);

                scene.add(mtnGroup);
                setTimeout(() => scene.remove(mtnGroup), 2000);
            }

            function showToast(msg) {
                const toast = document.getElementById('toast-msg');
                toast.innerText = msg;
                toast.style.opacity = 1;
                setTimeout(() => toast.style.opacity = 0, 1800);
            }

            function checkStageProgress() {
                const curStage = stagesInfo.find(s => s.id === state.stage);
                if (state.killCount >= curStage.target) {
                    state.stage++;
                    state.killCount = 0;
                    const nextStage = stagesInfo.find(s => s.id === state.stage);
                    showToast(`🎉 ${nextStage.name} 진입!`);
                }
                updateUI();
            }

            function updateUI() {
                const curStage = stagesInfo.find(s => s.id === state.stage);
                document.getElementById('ui-gold').innerText = state.gold;
                document.getElementById('ui-level').innerText = `Lv.${state.level}`;
                document.getElementById('ui-hp-fill').style.width = `${(state.hp / state.maxHp) * 100}%`;
                document.getElementById('ui-mp-fill').style.width = `${(state.mp / state.maxMp) * 100}%`;
                document.getElementById('stat-atk').innerText = state.atk;
                document.getElementById('ui-stage').innerText = `${curStage.name} (${state.killCount}/${curStage.target})`;
            }

            // 조이스틱
            let moveVector = { x: 0, z: 0 };
            const joyArea = document.getElementById('joystick-area');
            const joyHandle = document.getElementById('joystick-handle');
            let isDragging = false, startX = 0, startY = 0;

            const onStart = (e) => { isDragging = true; const t = e.touches ? e.touches[0] : e; startX = t.clientX; startY = t.clientY; };
            const onMove = (e) => {
                if (!isDragging) return;
                const t = e.touches ? e.touches[0] : e;
                let dx = t.clientX - startX, dy = t.clientY - startY;
                const dist = Math.sqrt(dx*dx + dy*dy), maxR = 30;
                if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
                joyHandle.style.transform = `translate(${dx}px, ${dy}px)`;
                moveVector.x = dx / maxR; moveVector.z = dy / maxR;
            };
            const onEnd = () => { isDragging = false; joyHandle.style.transform = `translate(0,0)`; moveVector = { x: 0, z: 0 }; };

            joyArea.addEventListener('touchstart', onStart);
            window.addEventListener('touchmove', onMove);
            window.addEventListener('touchend', onEnd);
            joyArea.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);

            // ⚔️ 액션 버튼
            document.getElementById('btn-attack').onclick = () => {
                for(let p=0; p<6; p++) createIceParticle(playerGroup.position, 0.3, 0.3);
                for(let i = monsters.length - 1; i >= 0; i--) {
                    const hitRange = monsters[i].userData.hitSize + 1.5;
                    if (playerGroup.position.distanceTo(monsters[i].position) < hitRange) {
                        for(let p=0; p<15; p++) createIceParticle(monsters[i].position, 0.5, 0.6);
                        scene.remove(monsters[i]);
                        monsters.splice(i, 1);
                        state.gold += 30;
                        state.killCount++;
                        checkStageProgress();
                        break;
                    }
                }
            };

            document.getElementById('btn-skill').onclick = () => {
                if (state.mp >= 10) {
                    state.mp -= 10;
                    launchIceOrb();
                    updateUI();
                }
            };

            document.getElementById('btn-ult').onclick = () => {
                if (state.mp >= 30) {
                    state.mp -= 30;
                    state.isAwakened = true;
                    createSnowMountain(playerGroup.position);
                    createIceWings();
                    for(let p=0; p<40; p++) createIceParticle(playerGroup.position, 0.6, 0.8);

                    for(let i = monsters.length - 1; i >= 0; i--) {
                        if (playerGroup.position.distanceTo(monsters[i].position) < 10.0) {
                            scene.remove(monsters[i]);
                            monsters.splice(i, 1);
                            state.gold += 35;
                            state.killCount++;
                        }
                    }
                    checkStageProgress();
                    showToast("❄️ 만해 [빙륜환] 각성!");
                }
            };

            document.getElementById('btn-dodge').onclick = () => {
                const backX = -Math.sin(playerGroup.rotation.y) * 3.5;
                const backZ = -Math.cos(playerGroup.rotation.y) * 3.5;
                playerGroup.position.x += backX;
                playerGroup.position.z += backZ;
                showToast("⚡ 순보(瞬步)!");
            };

            // 모달
            const toggleModal = (id, show) => document.getElementById(id).style.display = show ? 'flex' : 'none';
            document.getElementById('btn-open-stat').onclick = () => toggleModal('modal-stat', true);
            document.getElementById('btn-close-stat').onclick = () => toggleModal('modal-stat', false);
            document.getElementById('btn-open-inv').onclick = () => toggleModal('modal-inv', true);
            document.getElementById('btn-close-inv').onclick = () => toggleModal('modal-inv', false);
            document.getElementById('btn-open-shop').onclick = () => toggleModal('modal-shop', true);
            document.getElementById('btn-close-shop').onclick = () => toggleModal('modal-shop', false);
            document.getElementById('btn-open-height').onclick = () => toggleModal('modal-height', true);
            document.getElementById('btn-close-height').onclick = () => toggleModal('modal-height', false);

            document.getElementById('buy-atk').onclick = () => {
                if (state.gold >= 100) { state.gold -= 100; state.atk += 5; updateUI(); }
            };

            // LOOP
            function animate() {
                requestAnimationFrame(animate);

                if (moveVector.x !== 0 || moveVector.z !== 0) {
                    playerGroup.position.x += moveVector.x * 0.13;
                    playerGroup.position.z += moveVector.z * 0.13;
                    playerGroup.rotation.y = Math.atan2(moveVector.x, moveVector.z);
                }

                // 얼음송이 날아가기
                for (let i = iceProjectiles.length - 1; i >= 0; i--) {
                    const orb = iceProjectiles[i];
                    orb.position.addScaledVector(orb.userData.dir, orb.userData.speed);
                    orb.userData.life -= 1;

                    for (let mIdx = monsters.length - 1; mIdx >= 0; mIdx--) {
                        if (orb.position.distanceTo(monsters[mIdx].position) < monsters[mIdx].userData.hitSize + 0.8) {
                            scene.remove(monsters[mIdx]);
                            monsters.splice(mIdx, 1);
                            state.gold += 30;
                            state.killCount++;
                            checkStageProgress();
                            
                            scene.remove(orb);
                            iceProjectiles.splice(i, 1);
                            break;
                        }
                    }

                    if (orb.userData.life <= 0 && scene.children.includes(orb)) {
                        scene.remove(orb);
                        iceProjectiles.splice(i, 1);
                    }
                }

                // 파티클
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.position.add(p.userData.velocity);
                    p.userData.life -= 0.04;
                    p.material.opacity = p.userData.life;
                    if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
                }

                if (state.mp < state.maxMp) { state.mp += 0.12; updateUI(); }

                spawnMonster();
                monsters.forEach(m => m.lookAt(playerGroup.position));

                camera.position.set(playerGroup.position.x, playerGroup.position.y + 10, playerGroup.position.z + 9);
                camera.lookAt(playerGroup.position);

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
</html>
