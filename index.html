<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Grand Fantasy Action RPG - Fixed Version</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        /* ==========================================================================
           1. CORE RESET & VIEWPORT STYLES
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #02050a;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* ==========================================================================
           2. HEADS-UP DISPLAY (HUD) STYLES (레이아웃 겹침 해결)
           ========================================================================== */
        #top-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .status-panel {
            background: rgba(8, 15, 26, 0.92);
            border: 1.5px solid #00dfff;
            border-radius: 12px;
            padding: 10px 14px;
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 223, 255, 0.25);
            flex: 1;
            max-width: 240px;
            backdrop-filter: blur(8px);
        }

        .bar-container {
            margin-top: 4px;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #a0c0d0;
            margin-bottom: 2px;
        }

        .bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00dfff);
            transition: width 0.2s ease-out;
        }

        .exp-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #9900ff);
            transition: width 0.2s ease-out;
        }

        .hud-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        .hud-btn {
            background: rgba(5, 12, 22, 0.9);
            border: 1.5px solid #00dfff;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }

        .hud-btn:active {
            transform: scale(0.95);
        }

        .file-upload-wrapper {
            position: relative;
            display: inline-block;
        }

        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            pointer-events: auto;
        }

        /* ==========================================================================
           3. QUEST, NOTIFICATIONS & BOSS DISPLAY
           ========================================================================== */
        #quest-box {
            position: absolute;
            top: 135px;
            left: 10px;
            background: rgba(8, 15, 26, 0.85);
            border-left: 4px solid #ffd700;
            padding: 8px 12px;
            border-radius: 0 8px 8px 0;
            font-size: 11px;
            max-width: 220px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
        }

        #notice-banner {
            position: absolute;
            top: 100px;
            width: 100%;
            text-align: center;
            color: #00dfff;
            font-size: 22px;
            font-weight: 900;
            text-shadow: 0 0 20px #00dfff;
            opacity: 0;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            transform: translateY(-10px);
            pointer-events: none;
        }

        #boss-hp-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            max-width: 400px;
            background: rgba(10, 0, 5, 0.9);
            border: 2px solid #ff0055;
            border-radius: 10px;
            padding: 8px 12px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 20;
        }

        #boss-name {
            color: #ff0055;
            font-size: 12px;
            font-weight: 900;
            text-align: center;
        }

        .boss-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        #boss-hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0055, #ff5500);
            transition: width 0.15s ease;
        }

        /* ==========================================================================
           4. GAME MODAL OVERLAYS
           ========================================================================== */
        .game-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 290px;
            background: rgba(8, 15, 26, 0.96);
            border: 2px solid #00dfff;
            border-radius: 14px;
            padding: 16px;
            color: #ffffff;
            display: none;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto;
            z-index: 50;
            box-shadow: 0 0 30px rgba(0, 223, 255, 0.4);
            backdrop-filter: blur(10px);
        }

        .game-modal h2 {
            font-size: 16px;
            color: #00dfff;
            text-align: center;
            border-bottom: 1px solid rgba(0, 223, 255, 0.3);
            padding-bottom: 8px;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .modal-btn {
            background: #0077b6;
            border: 1px solid #00dfff;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }

        /* ==========================================================================
           5. TOUCH CONTROLS, SKILLS & FLOATING TEXT
           ========================================================================== */
        #joystick-container {
            position: absolute;
            bottom: 30px;
            left: 25px;
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 223, 255, 0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        #joystick-knob {
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #00dfff, #0077b6);
            border-radius: 50%;
            box-shadow: 0 0 10px #00dfff;
        }

        .btn-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 220px;
            height: 220px;
            pointer-events: none;
        }

        .action-btn {
            position: absolute;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.85);
            pointer-events: auto;
            background: rgba(5, 12, 22, 0.85);
            box-shadow: 0 0 12px rgba(0, 223, 255, 0.3);
            overflow: hidden;
        }

        .action-btn:active {
            transform: scale(0.88);
        }

        .cooldown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            color: #00dfff;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
        }

        #attack-btn { width: 80px; height: 80px; bottom: 10px; right: 10px; font-size: 16px; background: radial-gradient(circle, #0077b6, #002244); }
        #dodge-btn { width: 48px; height: 48px; bottom: 10px; right: 100px; font-size: 11px; }
        #skill-btn { width: 48px; height: 48px; bottom: 100px; right: 10px; font-size: 11px; }
        #ult-btn { width: 62px; height: 62px; bottom: 85px; right: 85px; font-size: 11px; background: radial-gradient(circle, #7000ff, #220044); border-color: #ff00ff; }

        #potion-btn {
            position: absolute;
            bottom: 35px;
            left: 150px;
            width: 46px;
            height: 46px;
            background: rgba(0, 255, 136, 0.15);
            border: 2px solid #00ff88;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            cursor: pointer;
            pointer-events: auto;
        }

        #potion-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff0055;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        #dmg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .dmg-text {
            position: absolute;
            font-weight: 900;
            font-size: 18px;
            color: #ffeb3b;
            text-shadow: 0 0 8px #000;
            transition: transform 0.6s ease-out, opacity 0.6s ease-out;
            pointer-events: none;
        }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 5, 10, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #ffffff;
            backdrop-filter: blur(15px);
        }

        #game-over h1 { color: #ff0055; font-size: 40px; margin-bottom: 10px; }
        #restart-btn { padding: 14px 30px; background: linear-gradient(90deg, #00dfff, #0077b6); border: none; border-radius: 10px; color: #000; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="top-bar">
            <div class="status-panel">
                <div>🛡️ 성기사 <span id="level-text" style="color:#00dfff;">Lv.1</span></div>
                <div style="font-size:10px; margin-top:3px;">💰 골드: <span id="gold-text" style="color:#ffd700;">0</span> | 스테이지 <span id="stage-text" style="color:#00ff88;">1</span></div>

                <div class="bar-container">
                    <div class="bar-label"><span>HP</span><span id="hp-text">100/100</span></div>
                    <div class="bar-bg"><div id="hp-fill" class="hp-fill"></div></div>
                </div>

                <div class="bar-container">
                    <div class="bar-label"><span>EXP</span><span id="exp-text">0%</span></div>
                    <div class="bar-bg"><div id="exp-fill" class="exp-fill"></div></div>
                </div>
            </div>

            <div class="hud-buttons">
                <button class="hud-btn" id="shop-btn">⚔️ 스탯 강화</button>
                <button class="hud-btn" id="inv-btn">🎒 인벤토리</button>
                <div class="file-upload-wrapper">
                    <button class="hud-btn">🧊 .GLB 모델 적용</button>
                    <input type="file" id="file-input" accept=".glb,.gltf">
                </div>
            </div>
        </div>

        <div id="boss-hp-container">
            <div id="boss-name">☠️ 심연의 서리 군주</div>
            <div class="boss-bar-bg"><div id="boss-hp-fill"></div></div>
        </div>

        <div id="quest-box">📜 퀘스트: <span id="quest-text">몬스터 5마리 처치</span></div>
        <div id="notice-banner">STAGE 1 - 던전 진입</div>
        <div id="dmg-layer"></div>

        <div id="potion-btn">🧪<div id="potion-count">3</div></div>

        <div id="shop-modal" class="game-modal">
            <h2>⚔️ 능력치 강화 상점</h2>
            <div class="modal-row">
                <span>공격력 (+6)</span>
                <button class="modal-btn" id="up-atk">100 G</button>
            </div>
            <div class="modal-row">
                <span>최대 체력 (+25)</span>
                <button class="modal-btn" id="up-hp">100 G</button>
            </div>
            <div class="modal-row">
                <span>이동 속도 (+6%)</span>
                <button class="modal-btn" id="up-spd">150 G</button>
            </div>
            <button class="hud-btn" id="close-shop" style="margin-top:8px; width:100%;">닫기</button>
        </div>

        <div id="inv-modal" class="game-modal">
            <h2>🎒 인벤토리</h2>
            <div id="inv-list" style="display:flex; flex-direction:column; gap:6px; font-size:11px;">
                <div>🗡️ 서리 칼날 검 (공격력 +10) [장착]</div>
                <div>🛡️ 성스러운 갑옷 (방어력 +5) [장착]</div>
                <div>🧪 체력 회복 포션 x<span id="potion-inv-count">3</span></div>
            </div>
            <button class="hud-btn" id="close-inv" style="margin-top:8px; width:100%;">닫기</button>
        </div>

        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>

        <div class="btn-container">
            <div id="dodge-btn" class="action-btn">회피<div id="cd-dodge" class="cooldown-overlay"></div></div>
            <div id="skill-btn" class="action-btn">돌진<div id="cd-skill" class="cooldown-overlay"></div></div>
            <div id="ult-btn" class="action-btn">궁극기<div id="cd-ult" class="cooldown-overlay"></div></div>
            <div id="attack-btn" class="action-btn">공격</div>
        </div>
    </div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p id="final-score" style="font-size: 18px; color: #a0c0d0;">도달 스테이지: STAGE 1</p>
        <button id="restart-btn" onclick="location.reload()">다시 도전하기</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'attack') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(280, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'skill') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(150, now + 0.25);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                } else if (type === 'hit') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                }
            } catch (e) {}
        }

        function startRpgEngine() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x02050a);
            scene.fog = new THREE.FogExp2(0x02050a, 0.015);

            const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lighting Setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xa0e0ff, 1.5);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Ground & Grid Setup
            const gridHelper = new THREE.GridHelper(150, 75, 0x00dfff, 0x0a2035);
            gridHelper.position.y = -0.01;
            scene.add(gridHelper);

            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x030812, roughness: 0.8 });
            const groundMesh = new THREE.Mesh(groundGeo, groundMat);
            groundMesh.rotation.x = -Math.PI / 2;
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);

            // Gameplay State
            let stage = 1, gold = 0, level = 1, exp = 0, maxExp = 100;
            let playerHP = 100, maxHP = 100, playerAtk = 20, moveSpeed = 0.15, potions = 3;
            let questTarget = 5, questProgress = 0, isGameOver = false, stageCleared = false, cameraShake = 0;

            const characterGroup = new THREE.Group();
            scene.add(characterGroup);

            let currentMesh = null, mixer = null;
            const clock = new THREE.Clock();

            // Default Player Geometric Avatar
            function createDefaultAvatar() {
                const group = new THREE.Group();
                const bodyGeo = new THREE.CapsuleGeometry(0.55, 1.2, 8, 16);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00dfff, roughness: 0.2, metalness: 0.5 });
                const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
                bodyMesh.position.y = 1.15;
                bodyMesh.castShadow = true;
                group.add(bodyMesh);

                const eyeGeo = new THREE.BoxGeometry(0.5, 0.15, 0.2);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const eye = new THREE.Mesh(eyeGeo, eyeMat);
                eye.position.set(0, 1.45, 0.35);
                group.add(eye);

                return group;
            }

            currentMesh = createDefaultAvatar();
            characterGroup.add(currentMesh);

            function updateUI() {
                document.getElementById('hp-text').innerText = `${Math.ceil(playerHP)}/${maxHP}`;
                document.getElementById('hp-fill').style.width = `${Math.max(0, (playerHP / maxHP) * 100)}%`;

                const expPct = Math.min(100, Math.floor((exp / maxExp) * 100));
                document.getElementById('exp-text').innerText = `${expPct}%`;
                document.getElementById('exp-fill').style.width = `${expPct}%`;

                document.getElementById('gold-text').innerText = gold;
                document.getElementById('stage-text').innerText = stage;
                document.getElementById('level-text').innerText = `Lv.${level}`;
                document.getElementById('potion-count').innerText = potions;
                document.getElementById('potion-inv-count').innerText = potions;
                document.getElementById('quest-text').innerText = `몬스터 처치 (${questProgress}/${questTarget})`;
            }

            // Custom GLB Loader Integration
            if (window.THREE && THREE.GLTFLoader) {
                const gltfLoader = new THREE.GLTFLoader();
                document.getElementById('file-input').onchange = function(e) {
                    const file = e.target.files[0];
                    if (!file) return;

                    const url = URL.createObjectURL(file);
                    gltfLoader.load(url, function(gltf) {
                        if (currentMesh) characterGroup.remove(currentMesh);
                        currentMesh = gltf.scene;

                        const box = new THREE.Box3().setFromObject(currentMesh);
                        const size = box.getSize(new THREE.Vector3());
                        const scale = 2.5 / (Math.max(size.x, size.y, size.z) || 1);

                        currentMesh.scale.set(scale, scale, scale);
                        characterGroup.add(currentMesh);

                        if (gltf.animations && gltf.animations.length > 0) {
                            mixer = new THREE.AnimationMixer(currentMesh);
                            mixer.clipAction(gltf.animations[0]).play();
                        }
                        showNotice('✨ .GLB 모델 변경 완료!');
                    });
                };
            }

            const enemies = [], projectiles = [], particles = [];
            let portalMesh = null;

            function showNotice(msg) {
                const banner = document.getElementById('notice-banner');
                banner.innerText = msg;
                banner.style.opacity = '1';
                banner.style.transform = 'translateY(0)';
                setTimeout(() => {
                    banner.style.opacity = '0';
                    banner.style.transform = 'translateY(-10px)';
                }, 2000);
            }

            function spawnDmgText(worldPos, damage) {
                const vector = worldPos.clone().project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;

                const el = document.createElement('div');
                el.className = 'dmg-text';
                el.innerText = Math.round(damage);
                el.style.left = `${x}px`;
                el.style.top = `${y}px`;

                document.getElementById('dmg-layer').appendChild(el);
                setTimeout(() => { el.style.transform = 'translateY(-30px)'; el.style.opacity = '0'; }, 30);
                setTimeout(() => el.remove(), 500);
            }

            function createParticles(pos, color, count = 10) {
                for (let i = 0; i < count; i++) {
                    const pGeo = new THREE.SphereGeometry(0.12, 4, 4);
                    const pMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
                    const p = new THREE.Mesh(pGeo, pMat);
                    p.position.copy(pos);
                    p.userData = { vel: new THREE.Vector3((Math.random() - 0.5) * 0.2, Math.random() * 0.2, (Math.random() - 0.5) * 0.2), life: 1.0 };
                    scene.add(p);
                    particles.push(p);
                }
            }

            function spawnPortal() {
                const pGeo = new THREE.TorusGeometry(1.5, 0.25, 16, 32);
                const pMat = new THREE.MeshBasicMaterial({ color: 0xffd700 });
                portalMesh = new THREE.Mesh(pGeo, pMat);
                portalMesh.position.set(characterGroup.position.x + 6, 1.2, characterGroup.position.z + 6);
                portalMesh.rotation.x = Math.PI / 2;
                scene.add(portalMesh);
                showNotice('✨ 차원 포탈 오픈!');
            }

            function initStageMonsters() {
                stageCleared = false;
                if (portalMesh) { scene.remove(portalMesh); portalMesh = null; }
                enemies.forEach(e => scene.remove(e));
                enemies.length = 0;

                questProgress = 0;
                questTarget = 3 + stage * 2;
                const hasBoss = (stage % 3 === 0);
                const count = hasBoss ? questTarget - 1 : questTarget;

                for (let i = 0; i < count; i++) spawnEnemy(Math.random() < 0.3 ? 'ranged' : 'normal');
                if (hasBoss) {
                    spawnEnemy('boss');
                    document.getElementById('boss-hp-container').style.display = 'flex';
                } else {
                    document.getElementById('boss-hp-container').style.display = 'none';
                }
                showNotice(`STAGE ${stage} 시작`);
                updateUI();
            }

            function spawnEnemy(type) {
                const enemyGroup = new THREE.Group();
                let scale = 1.0, color = 0xff3366, hp = 30 + stage * 15;

                if (type === 'ranged') { color = 0xffaa00; hp = 25 + stage * 10; }
                if (type === 'boss') { scale = 2.5; color = 0xff0055; hp = 200 + stage * 70; }

                const eGeo = new THREE.BoxGeometry(0.8 * scale, 1.4 * scale, 0.8 * scale);
                const eMat = new THREE.MeshStandardMaterial({ color: color });
                const mesh = new THREE.Mesh(eGeo, eMat);
                mesh.position.y = (1.4 * scale) / 2;
                mesh.castShadow = true;
                enemyGroup.add(mesh);

                const angle = Math.random() * Math.PI * 2;
                const dist = 10 + Math.random() * 10;
                enemyGroup.position.x = characterGroup.position.x + Math.cos(angle) * dist;
                enemyGroup.position.z = characterGroup.position.z + Math.sin(angle) * dist;

                enemyGroup.userData = { type: type, hp: hp, maxHp: hp, scale: scale, lastShoot: 0 };
                scene.add(enemyGroup);
                enemies.push(enemyGroup);
            }

            function applyDamageToEnemies(range, multiplier) {
                enemies.forEach((enemy, idx) => {
                    const dist = characterGroup.position.distanceTo(enemy.position);
                    if (dist <= range) {
                        const dmg = playerAtk * multiplier;
                        enemy.userData.hp -= dmg;
                        createParticles(enemy.position, 0x00dfff, 8);
                        spawnDmgText(enemy.position, dmg);
                        playSound('hit');

                        if (enemy.userData.type === 'boss') {
                            const ratio = Math.max(0, enemy.userData.hp / enemy.userData.maxHp);
                            document.getElementById('boss-hp-fill').style.width = `${ratio * 100}%`;
                        }

                        if (enemy.userData.hp <= 0) {
                            scene.remove(enemy);
                            enemies.splice(idx, 1);
                            gold += enemy.userData.type === 'boss' ? 200 : 30;
                            questProgress++;
                            exp += enemy.userData.type === 'boss' ? 150 : 30;

                            if (exp >= maxExp) {
                                exp -= maxExp; level++; maxExp = Math.floor(maxExp * 1.4);
                                playerAtk += 5; maxHP += 20; playerHP = maxHP;
                                showNotice(`레벨 업! (Lv.${level})`);
                            }

                            if (enemy.userData.type === 'boss') document.getElementById('boss-hp-container').style.display = 'none';
                            if (questProgress >= questTarget && !stageCleared) {
                                stageCleared = true;
                                spawnPortal();
                            }
                            updateUI();
                        }
                    }
                });
            }

            // Modal Interactions
            document.getElementById('shop-btn').onclick = () => { document.getElementById('shop-modal').style.display = 'flex'; };
            document.getElementById('close-shop').onclick = () => { document.getElementById('shop-modal').style.display = 'none'; };
            document.getElementById('inv-btn').onclick = () => { document.getElementById('inv-modal').style.display = 'flex'; };
            document.getElementById('close-inv').onclick = () => { document.getElementById('inv-modal').style.display = 'none'; };

            document.getElementById('up-atk').onclick = () => { if (gold >= 100) { gold -= 100; playerAtk += 5; updateUI(); } };
            document.getElementById('up-hp').onclick = () => { if (gold >= 100) { gold -= 100; maxHP += 20; playerHP += 20; updateUI(); } };
            document.getElementById('up-spd').onclick = () => { if (gold >= 150) { gold -= 150; moveSpeed += 0.015; updateUI(); } };

            document.getElementById('potion-btn').onclick = () => {
                if (potions > 0 && playerHP < maxHP) {
                    potions--; playerHP = Math.min(maxHP, playerHP + 40);
                    createParticles(characterGroup.position, 0x00ff88, 12);
                    updateUI();
                }
            };

            // Buttons
            document.getElementById('attack-btn').onclick = () => { playSound('attack'); applyDamageToEnemies(3.0, 1.0); };
            document.getElementById('dodge-btn').onclick = () => {
                playSound('skill');
                const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterGroup.rotation.y);
                characterGroup.position.add(forward.multiplyScalar(4.0));
            };
            document.getElementById('skill-btn').onclick = () => {
                playSound('skill');
                const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterGroup.rotation.y);
                characterGroup.position.add(forward.multiplyScalar(5.0));
                applyDamageToEnemies(4.0, 2.0);
            };
            document.getElementById('ult-btn').onclick = () => {
                playSound('skill'); cameraShake = 15; applyDamageToEnemies(8.0, 4.0);
            };

            // Joystick Input
            let moveDir = { x: 0, z: 0 };
            const joystick = document.getElementById('joystick-container');
            const knob = document.getElementById('joystick-knob');
            let isDragging = false, startX = 0, startY = 0;

            function handleTouchStart(e) {
                isDragging = true;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const t = e.touches ? e.touches[0] : e;
                startX = t.clientX; startY = t.clientY;
            }

            function handleTouchMove(e) {
                if (!isDragging) return;
                const t = e.touches ? e.touches[0] : e;
                let dx = t.clientX - startX, dy = t.clientY - startY;
                const dist = Math.sqrt(dx * dx + dy * dy), maxR = 35;
                if (dist > maxR) { dx = (dx / dist) * maxR; dy = (dy / dist) * maxR; }
                knob.style.transform = `translate(${dx}px, ${dy}px)`;
                moveDir.x = dx / maxR; moveDir.z = dy / maxR;
            }

            function handleTouchEnd() {
                isDragging = false;
                knob.style.transform = 'translate(0px, 0px)';
                moveDir.x = 0; moveDir.z = 0;
            }

            joystick.ontouchstart = handleTouchStart; window.ontouchmove = handleTouchMove; window.ontouchend = handleTouchEnd;
            joystick.onmousedown = handleTouchStart; window.onmousemove = handleTouchMove; window.onmouseup = handleTouchEnd;

            initStageMonsters();

            // Render Loop
            function renderLoop() {
                if (isGameOver) return;
                requestAnimationFrame(renderLoop);

                const delta = clock.getDelta();
                if (mixer) mixer.update(delta);

                if (moveDir.x !== 0 || moveDir.z !== 0) {
                    characterGroup.position.x += moveDir.x * moveSpeed;
                    characterGroup.position.z += moveDir.z * moveSpeed;
                    characterGroup.rotation.y = Math.atan2(moveDir.x, moveDir.z);
                }

                if (portalMesh && characterGroup.position.distanceTo(portalMesh.position) < 1.8) {
                    stage++;
                    initStageMonsters();
                }

                particles.forEach((p, idx) => {
                    p.position.add(p.userData.vel);
                    p.userData.life -= 0.04;
                    p.material.opacity = p.userData.life;
                    if (p.userData.life <= 0) { scene.remove(p); particles.splice(idx, 1); }
                });

                const now = Date.now();
                enemies.forEach((enemy) => {
                    const dist = characterGroup.position.distanceTo(enemy.position);
                    const dir = characterGroup.position.clone().sub(enemy.position).normalize();

                    if (enemy.userData.type === 'ranged') {
                        if (dist > 6.0) {
                            enemy.position.x += dir.x * 0.035; enemy.position.z += dir.z * 0.035;
                        }
                    } else {
                        const speed = enemy.userData.type === 'boss' ? 0.03 : 0.045;
                        enemy.position.x += dir.x * speed; enemy.position.z += dir.z * speed;
                    }

                    enemy.lookAt(characterGroup.position);

                    if (dist < (enemy.userData.type === 'boss' ? 2.0 : 1.0)) {
                        playerHP -= enemy.userData.type === 'boss' ? 0.8 : 0.3;
                        updateUI();
                        if (playerHP <= 0 && !isGameOver) {
                            isGameOver = true;
                            document.getElementById('final-score').innerText = `도달 스테이지: STAGE ${stage}`;
                            document.getElementById('game-over').style.display = 'flex';
                        }
                    }
                });

                // Camera Logic
                let shakeOffset = new THREE.Vector3(0, 0, 0);
                if (cameraShake > 0) {
                    shakeOffset.set((Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.3);
                    cameraShake--;
                }

                camera.position.x = characterGroup.position.x + shakeOffset.x;
                camera.position.z = characterGroup.position.z + 9.0 + shakeOffset.z;
                camera.position.y = 11.0 + shakeOffset.y;
                camera.lookAt(characterGroup.position.x, characterGroup.position.y + 0.8, characterGroup.position.z);

                renderer.render(scene, camera);
            }

            window.onresize = function() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            };

            renderLoop();
        }

        window.onload = startRpgEngine;
    </script>
</body>
</html>
