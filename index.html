<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Mobile Action RPG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #1a2a3a; font-family: 'Segoe UI', sans-serif; color: #fff; }

        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* TOP HUD */
        #top-hud { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; }
        .panel-box { background: rgba(15, 30, 50, 0.9); border: 1.5px solid #00dfff; border-radius: 8px; padding: 10px; width: 200px; pointer-events: auto; box-shadow: 0 0 15px rgba(0, 223, 255, 0.4); }
        .gold-text { color: #ffd700; }
        .bar-container { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.2); border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .bar-fill-hp { width: 100%; height: 100%; background: linear-gradient(90deg, #00ff88, #00b894); transition: width 0.15s; }
        .bar-fill-mp { width: 100%; height: 100%; background: linear-gradient(90deg, #0984e3, #74b9ff); transition: width 0.15s; }
        .quest-box { margin-top: 8px; background: rgba(0, 223, 255, 0.15); border-left: 3px solid #f1c40f; padding: 5px; font-size: 11px; }

        .top-right-btns { display: flex; flex-direction: column; gap: 6px; }
        .btn-hud { background: rgba(10, 25, 45, 0.9); border: 1.5px solid #00dfff; color: #fff; padding: 7px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; pointer-events: auto; cursor: pointer; text-shadow: 0 0 4px #00dfff; }
        .btn-hud:active { transform: scale(0.95); }

        .btn-glb-highlight {
            border-color: #00ff88 !important;
            color: #00ff88 !important;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.6) !important;
        }

        /* JOYSTICK & BUTTONS */
        #joystick-area { position: absolute; bottom: 35px; left: 30px; width: 110px; height: 110px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(0, 223, 255, 0.5); border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #joystick-handle { width: 45px; height: 45px; background: radial-gradient(circle, #00dfff, #0077b6); border-radius: 50%; box-shadow: 0 0 15px #00dfff; }

        .action-area { position: absolute; bottom: 20px; right: 20px; width: 220px; height: 220px; pointer-events: none; }
        .btn-action { position: absolute; border-radius: 50%; color: #fff; font-weight: bold; display: flex; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; background: rgba(10, 25, 45, 0.9); border: 1.5px solid #00dfff; box-shadow: 0 0 10px rgba(0, 223, 255, 0.4); font-size: 11px; }
        .btn-action:active { transform: scale(0.9); }
        #btn-attack { width: 80px; height: 80px; bottom: 0; right: 0; font-size: 16px; background: radial-gradient(circle, #0099ff, #0044cc); border-color: #66ccff; box-shadow: 0 0 15px #0099ff; }
        #btn-dodge { width: 50px; height: 50px; bottom: 0; right: 100px; }
        #btn-skill { width: 50px; height: 50px; bottom: 100px; right: 0; background: radial-gradient(circle, #ff9f43, #ee5253); border-color: #ff9f43; box-shadow: 0 0 12px #ff9f43; }
        #btn-ult { width: 65px; height: 65px; bottom: 80px; right: 80px; border-color: #e056fd; background: radial-gradient(circle, #be2edd, #6c5ce7); box-shadow: 0 0 18px #e056fd; font-size: 13px; }

        /* MODALS */
        .modal-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 290px; background: rgba(15, 30, 50, 0.98); border: 2px solid #00dfff; border-radius: 12px; padding: 15px; display: none; flex-direction: column; gap: 10px; pointer-events: auto; z-index: 100; box-shadow: 0 0 25px rgba(0, 223, 255, 0.5); }
        .modal-header { font-size: 14px; font-weight: bold; color: #00dfff; text-align: center; border-bottom: 1px solid rgba(0, 223, 255, 0.3); padding-bottom: 6px; }
        .modal-body { font-size: 11px; display: flex; flex-direction: column; gap: 8px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.08); padding: 6px; border-radius: 4px; }
        .stat-btn { background: #0077b6; border: 1px solid #00dfff; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        #toast-msg { position: absolute; top: 30%; width: 100%; text-align: center; color: #00ff88; font-size: 20px; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.4s; z-index: 20; text-shadow: 0 0 12px #00ff88; }

        #height-slider-box { display: flex; flex-direction: column; gap: 6px; align-items: center; margin-top: 5px; }
        #height-slider-box input { width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <input type="file" id="glb-file-input" accept=".glb, .gltf" style="display: none;">

    <div id="ui-layer">
        <div id="top-hud">
            <div class="panel-box">
                <div style="display:flex; justify-content:space-between;">
                    <span>🛡️ 기사 <b id="ui-level" style="color:#00dfff;">Lv.1</b></span>
                    <span class="gold-text">💰 <b id="ui-gold">0</b></span>
                </div>
                <div class="bar-container"><div id="ui-hp-fill" class="bar-fill-hp"></div></div>
                <div class="bar-container"><div id="ui-mp-fill" class="bar-fill-mp"></div></div>
                <div class="quest-box">📜 목표: <span id="ui-quest">몬스터 처치</span></div>
            </div>
            
            <div class="top-right-btns">
                <button class="btn-hud" id="btn-open-stat">⚔️ 캐릭터 스탯</button>
                <button class="btn-hud" id="btn-open-inv">🎒 인벤토리</button>
                <button class="btn-hud" id="btn-open-shop">🏪 상점</button>
                <button class="btn-hud btn-glb-highlight" id="btn-upload-glb">📦 .GLB 모델 적용</button>
                <button class="btn-hud" id="btn-open-height" style="border-color:#ff9f43; color:#ff9f43;">📏 캐릭터 높이 조절</button>
            </div>
        </div>

        <div id="toast-msg">게임 시작!</div>

        <div id="joystick-area"><div id="joystick-handle"></div></div>

        <div class="action-area">
            <div id="btn-dodge" class="btn-action">회피</div>
            <div id="btn-skill" class="btn-action">돌진</div>
            <div id="btn-ult" class="btn-action">궁극기</div>
            <div id="btn-attack" class="btn-action">공격</div>
        </div>

        <div id="modal-stat" class="modal-overlay">
            <div class="modal-header">⚔️ 캐릭터 스탯</div>
            <div class="modal-body">
                <div class="stat-row"><span>공격력</span><b id="stat-atk">25</b></div>
                <div class="stat-row"><span>방어력</span><b id="stat-def">5</b></div>
            </div>
            <button class="btn-hud" id="btn-close-stat">닫기</button>
        </div>

        <div id="modal-inv" class="modal-overlay">
            <div class="modal-header">🎒 인벤토리</div>
            <div class="modal-body">
                <div class="stat-row"><span>🗡️ 성스러운 검</span><span style="color:#00ff88;">+15 ATK</span></div>
            </div>
            <button class="btn-hud" id="btn-close-inv">닫기</button>
        </div>

        <div id="modal-shop" class="modal-overlay">
            <div class="modal-header">🏪 강화 상점</div>
            <div class="modal-body">
                <div class="stat-row">
                    <div>공격력 +5<br><small class="gold-text">100 Gold</small></div>
                    <button class="stat-btn" id="buy-atk">강화</button>
                </div>
            </div>
            <button class="btn-hud" id="btn-close-shop">닫기</button>
        </div>

        <div id="modal-height" class="modal-overlay">
            <div class="modal-header">📏 캐릭터 높이(Y축) 수동 조절</div>
            <div class="modal-body">
                <div id="height-slider-box">
                    <span>파묻힘 해제 높이: <b id="height-val" style="color:#00dfff;">0.0</b></span>
                    <input type="range" id="height-slider" min="-3" max="5" step="0.1" value="0">
                </div>
            </div>
            <button class="btn-hud" id="btn-close-height">완료</button>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const state = { gold: 0, level: 1, hp: 100, maxHp: 100, mp: 50, maxMp: 50, atk: 25 };

            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();

            // ☀️ 1. 배경을 훨씬 밝게 변경 (밝은 푸른 하늘색 배경)
            scene.background = new THREE.Color(0x3a5e8c);
            scene.fog = new THREE.FogExp2(0x3a5e8c, 0.015);

            const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // ☀️ 2. 조명 강도를 대폭 올림 (전체적으로 환한 태양광 연출)
            scene.add(new THREE.AmbientLight(0xffffff, 1.4)); // 기본 환경광 강화

            const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.8); // 태양빛
            mainLight.position.set(20, 40, 20);
            mainLight.castShadow = true;
            scene.add(mainLight);

            const subLight = new THREE.DirectionalLight(0x80d4ff, 0.8); // 보조 푸른빛
            subLight.position.set(-20, 20, -20);
            scene.add(subLight);

            // 밝고 화사한 그리드 & 바닥
            const grid = new THREE.GridHelper(100, 50, 0x00dfff, 0x5588bb);
            grid.position.y = 0.01;
            scene.add(grid);

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0x1c3b5e, roughness: 0.5 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // PLAYER GROUP
            const playerGroup = new THREE.Group();
            scene.add(playerGroup);

            const characterContainer = new THREE.Group();
            playerGroup.add(characterContainer);

            let defaultMesh = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.6, 1.6, 16),
                new THREE.MeshStandardMaterial({ color: 0x00dfff, emissive: 0x004466 })
            );
            defaultMesh.position.y = 0.8;
            defaultMesh.castShadow = true;
            characterContainer.add(defaultMesh);

            // 📦 GLB 로더 및 높이 조절
            const glbInput = document.getElementById('glb-file-input');
            const btnGlb = document.getElementById('btn-upload-glb');
            const heightSlider = document.getElementById('height-slider');
            const heightVal = document.getElementById('height-val');

            btnGlb.onclick = () => glbInput.click();

            heightSlider.addEventListener('input', (e) => {
                const yOffset = parseFloat(e.target.value);
                characterContainer.position.y = yOffset;
                heightVal.innerText = yOffset.toFixed(1);
            });

            glbInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                showToast("3D 모델 로딩 중...");

                const url = URL.createObjectURL(file);
                const loader = new THREE.GLTFLoader();

                loader.load(url, (gltf) => {
                    while(characterContainer.children.length > 0) {
                        characterContainer.remove(characterContainer.children[0]);
                    }

                    const loadedModel = gltf.scene;

                    const box = new THREE.Box3().setFromObject(loadedModel);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 2.0 / (maxDim || 1);
                    loadedModel.scale.set(scale, scale, scale);

                    const newBox = new THREE.Box3().setFromObject(loadedModel);
                    const autoY = -newBox.min.y;
                    characterContainer.position.y = autoY;
                    heightSlider.value = autoY;
                    heightVal.innerText = autoY.toFixed(1);

                    loadedModel.traverse((child) => {
                        if (child.isMesh) child.castShadow = true;
                    });

                    characterContainer.add(loadedModel);
                    showToast("🎉 적용 완료!");
                }, undefined, (err) => {
                    showToast("⚠️ GLB 로딩 실패!");
                });
            });

            // 💥 이펙트 파티클 시스템 (스킬 예쁘게 효과 내기)
            const particles = [];
            function createEffectParticle(pos, colorHex, size = 0.2, speed = 0.2) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(size, 8, 8),
                    new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 1 })
                );
                p.position.copy(pos);
                p.position.x += (Math.random() - 0.5) * 1.2;
                p.position.y += Math.random() * 0.8;
                p.position.z += (Math.random() - 0.5) * 1.2;

                p.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * speed,
                        Math.random() * speed * 1.5,
                        (Math.random() - 0.5) * speed
                    ),
                    life: 1.0
                };
                scene.add(p);
                particles.push(p);
            }

            // 🔮 궁극기 전용 보라색 마법진 링 효과
            function createUltRing(pos) {
                const ringGeo = new THREE.RingGeometry(0.1, 0.8, 32);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0xe056fd, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = -Math.PI / 2;
                ring.position.copy(pos);
                ring.position.y = 0.05;
                scene.add(ring);

                let scale = 1;
                const expand = setInterval(() => {
                    scale += 0.6;
                    ring.scale.set(scale, scale, scale);
                    ringMat.opacity -= 0.05;
                    if (ringMat.opacity <= 0) {
                        clearInterval(expand);
                        scene.remove(ring);
                    }
                }, 30);
            }

            // 몬스터 생성
            const monsters = [];
            function spawnMonster() {
                if (monsters.length < 3) {
                    const m = new THREE.Mesh(
                        new THREE.BoxGeometry(1, 1, 1),
                        new THREE.MeshStandardMaterial({ color: 0xff3366, roughness: 0.3 })
                    );
                    const angle = Math.random() * Math.PI * 2;
                    m.position.set(playerGroup.position.x + Math.cos(angle) * 8, 0.5, playerGroup.position.z + Math.sin(angle) * 8);
                    m.castShadow = true;
                    scene.add(m);
                    monsters.push(m);
                }
            }

            function showToast(msg) {
                const toast = document.getElementById('toast-msg');
                toast.innerText = msg;
                toast.style.opacity = 1;
                setTimeout(() => toast.style.opacity = 0, 1800);
            }

            function updateUI() {
                document.getElementById('ui-gold').innerText = state.gold;
                document.getElementById('ui-level').innerText = `Lv.${state.level}`;
                document.getElementById('ui-hp-fill').style.width = `${(state.hp / state.maxHp) * 100}%`;
                document.getElementById('ui-mp-fill').style.width = `${(state.mp / state.maxMp) * 100}%`;
                document.getElementById('stat-atk').innerText = state.atk;
            }

            // 조이스틱
            let moveVector = { x: 0, z: 0 };
            const joyArea = document.getElementById('joystick-area');
            const joyHandle = document.getElementById('joystick-handle');
            let isDragging = false, startX = 0, startY = 0;

            const onStart = (e) => { isDragging = true; const t = e.touches ? e.touches[0] : e; startX = t.clientX; startY = t.clientY; };
            const onMove = (e) => {
                if (!isDragging) return;
                const t = e.touches ? e.touches[0] : e;
                let dx = t.clientX - startX, dy = t.clientY - startY;
                const dist = Math.sqrt(dx*dx + dy*dy), maxR = 30;
                if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
                joyHandle.style.transform = `translate(${dx}px, ${dy}px)`;
                moveVector.x = dx / maxR; moveVector.z = dy / maxR;
            };
            const onEnd = () => { isDragging = false; joyHandle.style.transform = `translate(0,0)`; moveVector = { x: 0, z: 0 }; };

            joyArea.addEventListener('touchstart', onStart);
            window.addEventListener('touchmove', onMove);
            window.addEventListener('touchend', onEnd);
            joyArea.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);

            // ⚔️ 화려한 스킬 및 공격 액션
            // 1. 일반 공격 (타격 이펙트)
            document.getElementById('btn-attack').onclick = () => {
                let hit = false;
                for(let i = monsters.length - 1; i >= 0; i--) {
                    if (playerGroup.position.distanceTo(monsters[i].position) < 2.5) {
                        // 타격 이펙트 파티클
                        for(let p=0; p<10; p++) createEffectParticle(monsters[i].position, 0xff3300, 0.25, 0.3);
                        scene.remove(monsters[i]);
                        monsters.splice(i, 1);
                        state.gold += 20;
                        hit = true;
                    }
                }
                if (hit) { updateUI(); showToast("⚔️ 몬스터 처치! +20 Gold"); }
            };

            // 2. 돌진 스킬 (황금 빛 궤적)
            document.getElementById('btn-skill').onclick = () => {
                if (state.mp >= 10) {
                    state.mp -= 10;
                    updateUI();
                    
                    const forwardX = Math.sin(playerGroup.rotation.y) * 4.5;
                    const forwardZ = Math.cos(playerGroup.rotation.y) * 4.5;

                    // 이동 경로에 파티클 잔상 생성
                    for(let i=0; i<15; i++){
                        createEffectParticle(playerGroup.position, 0xffaa00, 0.2, 0.15);
                    }

                    playerGroup.position.x += forwardX;
                    playerGroup.position.z += forwardZ;
                    showToast("⚡ 황금 돌진!");
                } else {
                    showToast("마나가 부족합니다!");
                }
            };

            // 3. 궁극기 스킬 (마법진 + 대폭발)
            document.getElementById('btn-ult').onclick = () => {
                if (state.mp >= 30) {
                    state.mp -= 30;
                    updateUI();

                    // 보라색 마법진 링 확산 연출
                    createUltRing(playerGroup.position);

                    // 폭발 이펙트
                    for(let p=0; p<30; p++) {
                        createEffectParticle(playerGroup.position, 0xe056fd, 0.35, 0.5);
                    }

                    let count = 0;
                    for(let i = monsters.length - 1; i >= 0; i--) {
                        if (playerGroup.position.distanceTo(monsters[i].position) < 7.0) {
                            scene.remove(monsters[i]);
                            monsters.splice(i, 1);
                            state.gold += 25;
                            count++;
                        }
                    }
                    showToast(`💥 궁극기 발동! (${count}마리 섬멸)`);
                } else {
                    showToast("마나가 부족합니다!");
                }
            };

            // 4. 후방 회피 (바람 이펙트)
            document.getElementById('btn-dodge').onclick = () => {
                for(let p=0; p<8; p++) createEffectParticle(playerGroup.position, 0x00dfff, 0.15, 0.1);
                const backX = -Math.sin(playerGroup.rotation.y) * 2.5;
                const backZ = -Math.cos(playerGroup.rotation.y) * 2.5;
                playerGroup.position.x += backX;
                playerGroup.position.z += backZ;
                showToast("💨 후방 회피!");
            };

            // 모달 관리
            const toggleModal = (id, show) => document.getElementById(id).style.display = show ? 'flex' : 'none';
            document.getElementById('btn-open-stat').onclick = () => toggleModal('modal-stat', true);
            document.getElementById('btn-close-stat').onclick = () => toggleModal('modal-stat', false);
            document.getElementById('btn-open-inv').onclick = () => toggleModal('modal-inv', true);
            document.getElementById('btn-close-inv').onclick = () => toggleModal('modal-inv', false);
            document.getElementById('btn-open-shop').onclick = () => toggleModal('modal-shop', true);
            document.getElementById('btn-close-shop').onclick = () => toggleModal('modal-shop', false);
            document.getElementById('btn-open-height').onclick = () => toggleModal('modal-height', true);
            document.getElementById('btn-close-height').onclick = () => toggleModal('modal-height', false);

            document.getElementById('buy-atk').onclick = () => {
                if (state.gold >= 100) { state.gold -= 100; state.atk += 5; updateUI(); }
            };

            // GAME LOOP
            function animate() {
                requestAnimationFrame(animate);

                if (moveVector.x !== 0 || moveVector.z !== 0) {
                    playerGroup.position.x += moveVector.x * 0.12;
                    playerGroup.position.z += moveVector.z * 0.12;
                    playerGroup.rotation.y = Math.atan2(moveVector.x, moveVector.z);
                }

                // 이펙트 파티클 이동 및 소멸 로직
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.position.add(p.userData.velocity);
                    p.userData.life -= 0.04;
                    p.material.opacity = p.userData.life;

                    if (p.userData.life <= 0) {
                        scene.remove(p);
                        particles.splice(i, 1);
                    }
                }

                // 마나 자동 회복
                if (state.mp < state.maxMp) {
                    state.mp += 0.08;
                    updateUI();
                }

                spawnMonster();
                monsters.forEach(m => m.lookAt(playerGroup.position));

                camera.position.set(playerGroup.position.x, playerGroup.position.y + 10, playerGroup.position.z + 9);
                camera.lookAt(playerGroup.position);

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
</html>
